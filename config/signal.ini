# ═══════════════════════════════════════════════════════════════════════════════
# 价格确认入场（Pending Entry）
# 信号产生后不立即市价下单，等 Quote bid/ask 落入计算好的入场区间后执行
# ═══════════════════════════════════════════════════════════════════════════════
[pending_entry]
# ── 入场区间 ATR 倍数 ──
# Pullback 模式（趋势策略）：等回撤方向 / 追价方向
pullback_atr_factor = 0.3
chase_atr_factor = 0.1
# Momentum 模式（突破策略）：顺势追价方向
momentum_atr_factor = 0.5
# Symmetric 模式（均值回归 / 投票结果）：以 close 为中心对称半宽
symmetric_atr_factor = 0.4

# ── 价格监控 ──
check_interval = 0.5
# pending 期间额外 spread 上限（0=不做额外检查，复用 signal_filters）
max_spread_points = 0

# ── 超时（单位：bars 数量 × bar 周期秒数）──
timeout_bars_M5 = 2.0
timeout_bars_M15 = 1.5
timeout_bars_M30 = 1.2
timeout_bars_H1 = 1.0
timeout_bars_H4 = 0.5
timeout_bars_D1 = 0.25
default_timeout_bars = 2.0

# ── 新信号覆盖行为 ──
cancel_on_new_signal = true
# false = 同方向新信号不覆盖旧 pending（避免重复）
cancel_same_direction = false

# ── 策略级覆盖（可选）──
# 格式：策略名__参数名 = 值
# supertrend__pullback_atr_factor = 0.4
# rsi_reversion__symmetric_atr_factor = 0.5
