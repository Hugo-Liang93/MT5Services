# signal.ini — 信号生成与自动交易配置
#
# 控制信号策略的执行参数、仓位大小、过滤条件和状态机行为。
# [preview] 和 [position_management] 中的键名在加载时会被重命名（见注释）。

[signal]
# ── 自动交易 ──────────────────────────────────────────────────────────
# 是否启用自动下单（信号评估后自动执行交易）
# 默认 false，确保新部署时不会意外开仓。
auto_trade_enabled = true

# 自动下单所需的最低信号置信度（0.0~1.0）
auto_trade_min_confidence = 0.35

# 自动下单是否要求信号已处于 "armed" 状态
# true = 信号须经历 preview → armed 稳定窗口后才能触发下单
auto_trade_require_armed = false

# 同一品种允许的最大并发持仓数
# 同品种单方向单仓位，避免多 TF 信号对冲
max_concurrent_positions_per_symbol = 

# London -> New York 时段切换前后冷却窗口（分钟）
session_transition_cooldown_minutes = 15

# ── ATR 仓位计算 ───────────────────────────────────────────────────────
# 止损距离 = ATR × sl_atr_multiplier
sl_atr_multiplier = 1.5

# 止盈距离 = ATR × tp_atr_multiplier
tp_atr_multiplier = 3.0

# 每笔交易风险占账户净值的百分比（用于计算仓位手数）
risk_percent_per_trade = 1.0

# 单笔交易最小手数（受经纪商最小手数限制）
min_volume = 0.01

# 单笔交易最大手数
max_volume = 1.0

# ── 过滤条件 ────────────────────────────────────────────────────────────
# 基础点差（交易商标称固定点差）。
# 设置后，各时段上限和全局兜底均自动计算：
#   时段上限 = base_spread_points × [session_spread_limits] 中的乘数
#   全局兜底 = base_spread_points × max_spread_multiplier
# base_spread_points = 0 时回退到手动模式（max_spread_points 和时段值为绝对点差）。
base_spread_points = 30
max_spread_multiplier = 2.70
max_spread_points = 80

# 允许交易的交易时段（逗号分隔）
# 可选值: asia（亚盘）, london（欧盘）, new_york（美盘）
allowed_sessions = asia,london,new_york

# 是否启用经济事件过滤器
# 启用后，重要经济数据发布窗口内不评估信号。
economic_filter_enabled = true

# 经济事件过滤展望窗口（分钟）：事件发布前多少分钟内暂停信号评估
economic_lookahead_minutes = 30

# 经济事件过滤回溯窗口（分钟）：事件发布后多少分钟内暂停信号评估
economic_lookback_minutes = 15

# 经济事件最低 importance 阈值（低于此值的事件不触发过滤）
economic_importance_min = 3

# 波动率异常过滤：当前 ATR 超过 baseline ATR 的此倍数时，跳过策略评估
# 0 = 禁用，2.5 = ATR 暴增 2.5 倍时压制信号（防止突发行情下虚假信号）
volatility_atr_spike_multiplier = 2.5
# 日损失限制已统一到 risk.ini 的 daily_loss_limit_pct，
# 由 PreTradeRiskService 的 DailyLossLimitRule 统一执行。

# ── HTF 方向对齐置信度修正 ─────────────────────────────────────────────
# HTF 方向与当前信号方向一致时的置信度乘数
htf_alignment_boost = 1.10

# HTF 方向与当前信号方向冲突时的置信度乘数
htf_conflict_penalty = 0.70

[preview]
# Intrabar 预览信号（preview/armed）状态机参数。
# 注意：以下键名在加载后会重命名，Pydantic 字段名见括号。

# 触发 preview 信号所需的最低置信度（→ SignalConfig.min_preview_confidence）
min_confidence = 0.55

# 触发 preview 信号所需的最低 bar 进度比例（0.0~1.0）
# 黄金日内：M1 bar 共 60 秒，0.15 = 9 秒后开始评估（原 0.2 = 12 秒，差异不大）
# M5 时 0.15 = 45 秒，节省响应时间。
min_bar_progress = 0.15

# 信号方向维持一致多少秒后才升级为 armed 状态（→ SignalConfig.preview_stable_seconds）
# 黄金日内：M1 bar = 60 秒，15 秒 = 25% bar 长度，稳定性要求合理。
# M5 时 15 秒 = 5% bar，放宽为 10 秒可提前发现趋势，但噪声略增。
# 保持 15 秒以兼顾 M1 和 M5 场景。
stable_seconds = 15

# 同一 preview 状态的两次发射之间的最小间隔（秒）（→ SignalConfig.preview_cooldown_seconds）
# 黄金日内 M1：30 秒冷却 = 每根 bar 最多 2 次发射，避免重复噪声。合理。
cooldown_seconds = 30

# Intrabar 快照去重窗口（秒）：相同指标值在此窗口内只评估一次
# Bug修复：原值 1.0 对 M1 bar 过长——1 秒内可能有多个有效的不同指标快照。
# 降至 0.3 秒（300ms），确保每个有意义的价格变化都能被评估。
snapshot_dedupe_window_seconds = 0.3

[regime]
# Regime 亲和度预检（Pre-flight Affinity Gate）
#
# 策略在当前 Regime 下的 regime_affinity < min_affinity_skip 时，
# 直接跳过 evaluate() 调用，节省 CPU。
#
# 这是"白名单"式过滤：低于此值的策略在当前行情类型下可靠性极低，
# 跳过它们不会丢失有价值的信号，只会减少噪声。
#
# 参考：RANGING 时 ema_ribbon=0.10、donchian_breakout=0.15；
#        TRENDING 时 rsi_reversion=0.25、stoch_rsi=0.25。
# 设为 0.0 可禁用预检（评估全部策略，但更耗 CPU）。
min_affinity_skip = 0.25

# ── Delta Momentum Bonus（均值回归策略共享参数）───────────────────────
# d3 缩放系数：d3_bonus = min(d3 / scale, cap)
# delta_d3_scale = 10.0
# delta_d3_cap = 0.05
# d5 耗竭判定阈值和奖励：|d5| > threshold 时加 bonus
# delta_d5_threshold = 8.0
# delta_d5_bonus = 0.03

# Phase 3: 概率化 Regime 分类开关。
# true = 使用 soft regime 做 affinity 加权；false = 保持单一硬分类。
soft_regime_enabled = true

[regime_sizing]
# Regime-Aware 动态 SL/TP 倍数（在 timeframe 默认倍数基础上再乘）
# key 规则：
#   tp_<regime> = TP 缩放倍数
#   sl_<regime> = SL 缩放倍数
# regime: trending / ranging / breakout / uncertain
tp_trending =
tp_ranging =
tp_breakout =
tp_uncertain =
sl_trending =
sl_ranging =
sl_breakout =
sl_uncertain =

[voting]
# 跨策略多数表决引擎（Strategy Voting Engine）
#
# 同一 snapshot 所有策略评估完成后，对 confidence 加权求票，
# 额外发出一个 strategy="consensus" 的综合信号。
#
# consensus 信号与普通策略信号使用相同的状态机（preview/armed/confirmed），
# 可直接驱动自动交易，代表"多策略共识"的更高可信度决策。
enabled = true

# 买方或卖方权重占总权重的最低比例 → 产生方向性共识
# 0.40 = 40% 总 confidence 权重在同一方向 → 共识确立
consensus_threshold = 0.40

# 产生共识所需的最少"非 hold"策略数量
# 防止单一策略独自定论，要求至少 2 个策略形成合力
min_quorum = 2

# 方向分歧惩罚因子（0.0~1.0）
# 买卖双方都有较强权重时，说明市场方向不明，降低共识置信度。
# 0.5 = 完全分歧（买卖各半）时置信度降 50%
disagreement_penalty = 0.50

# 共识加成上限（0.0~0.3）
# 当胜出方向的策略越多（agreement_ratio 越高），给予基础置信度的额外加成。
# 全票同意 → +max_consensus_bonus；刚过半 → +0。
# 0.15 = 全票同意时基础置信度 +15%
# 算法：confidence = avg_winning_conf × (1 + bonus) × (1 - disagreement)
# 其中 avg_winning_conf 是胜出方向策略的平均 confidence（与单策略同一量级）
max_consensus_bonus = 0.15

[position_management]
# 移动止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时激活移动止损
trailing_atr_multiplier = 1.0

# 保本止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时将 SL 移至开仓价
breakeven_atr_threshold = 1.0

# 持仓状态与 MT5 终端的对账间隔（秒）（→ SignalConfig.position_reconcile_interval）
reconcile_interval = 10
end_of_day_close_enabled = true
# UTC 20:30 平仓，距 22:00 休市有 1.5h 缓冲（应对平仓失败重试/周五休市/API 卡顿）
end_of_day_close_hour_utc = 20
end_of_day_close_minute_utc = 30

# ── Trailing Take Profit（盈利后主动收缩 TP）──
trailing_tp_enabled = true
# 激活阈值：浮盈超过此 ATR 倍数后开始收缩 TP
trailing_tp_activation_atr = 1.2
# 从最高盈利点回撤的距离（ATR 倍数）
trailing_tp_trail_atr = 0.6

[circuit_breaker]
# 连续失败次数达到阈值后自动暂停自动交易（熔断开路）
# 注意：此处计的是 MT5 技术执行失败次数（下单 API 报错），不是亏损次数
max_consecutive_failures = 3

# T-3: 熔断开路后，自动尝试半开恢复的等待时间（分钟）
# 设为 0 禁用自动恢复（需手动调用 reset_circuit()）
circuit_auto_reset_minutes = 30

[pnl_circuit_breaker]
# PnL 熔断器：基于实际亏损次数（区别于 circuit_breaker 的技术故障计数）
# 连续 N 笔真实亏损后暂停自动交易
#
# 注意事项：
#   - 仅计 source="trade" 的实际平仓亏损（不计 source="signal" 的理论评估）
#   - 状态保存在 StrategyPerformanceTracker 内存中，重启后从 DB 恢复连续亏损序列
#   - 任意一笔盈利即重置连续亏损计数器
#   - 设 enabled = false 可完全禁用此保护
enabled =

# 连续亏损次数达到此值时触发熔断
max_consecutive_losses =

# 熔断开路后自动恢复的等待时间（分钟），0 = 不自动恢复（需重启服务）
cooldown_minutes =

[contract_sizes]
# T-2: 按品种配置合约大小，用于仓位计算（ATR 风险法）
# 格式：品种名 = 合约大小（手）
# XAUUSD = 100（1 手 = 100 盎司黄金，标准 XAUUSD 规格）
XAUUSD = 100.0
# 通用默认值（未在此配置的品种使用此值）
default = 100.0

[timeframe_risk]
# 时间框架差异化风险乘数：effective_risk_pct = base_risk_percent × multiplier
# 留空则使用 sizing.py 的内置默认值（M1:0.50, M5:0.75, M15:1.00, H1:1.20）
# 取消注释可覆盖：
# M1 = 0.50
# M5 = 0.75
# M15 = 1.00
# H1 = 1.20

[timeframe_min_confidence]
# Per-TF 最低交易置信度（对应管线末端的 final_confidence，不是 raw）
# 经过 affinity×perf×calibrator×HTF 多层折扣后的值，尺度约 0.2~0.7
# 原始 raw confidence 由 min_raw_confidence=0.45 在管线入口拦截
M5 =
M15 =
M30 =
H1 =
H4 =
D1 =

[htf_conflict_block]
# HTF 方向冲突时强制拒绝交易的 TF 列表
# 低 TF 趋势类信号若与大周期方向冲突（如 M5 做多但 H1 趋势做空），直接阻止下单
# 均值回归类策略（category=reversion）自动豁免 — 它们天然做反向（如超买回归做空）
# 这样低 TF 既保留了回归策略的活跃性，又避免了趋势策略逆势交易
enabled_timeframes =
# 豁免的策略类别（逗号分隔），这些类别的策略不受 HTF 方向阻止
# 默认豁免 reversion（均值回归）；可追加 session（亚盘区间突破等）
exempt_categories =

[session_spread_limits]
# 分时段 spread 乘数（基于 base_spread_points 自动计算上限）。
# 实际上限 = base_spread_points × 乘数。
# 未配置的 session 回退到 [signal].max_spread_points。
# 参考：base=30 时 → asia=54, london=48, new_york=54, off_hours=75
asia =
london =
new_york =
off_hours =

[strategy_sessions]
# 策略级 session 路由：在全局 allowed_sessions 内再细分每个策略何时参与。
# 趋势策略 — 仅在欧美盘流动性充足时运行
sma_trend = london,new_york
supertrend = london,new_york
macd_momentum = london,new_york
ema_ribbon = london,new_york
hma_cross = london,new_york
roc_momentum = london,new_york
session_momentum = london,new_york
# 突破策略 — 仅在欧美盘运行（亚盘假突破率高）
bollinger_breakout = london,new_york
donchian_breakout = london,new_york
keltner_bb_squeeze = london,new_york
fake_breakout = london,new_york
squeeze_release = london,new_york
# 均值回归策略 — 亚盘也可参与（XAUUSD 亚盘波动温和，回归有效）
rsi_reversion = asia,london
stoch_rsi = asia,london
williams_r = asia,london,new_york
cci_reversion = asia,london,new_york
price_action_reversal = asia,london,new_york
# 新增策略
asian_range_breakout = london
rsi_divergence = london,new_york
macd_divergence = london,new_york
adx_trend_fade = london,new_york
fib_pullback = london,new_york
# HTF 联动策略
htf_trend_pullback = london,new_york
htf_h4_pullback = london,new_york
htf_m30_pullback = london,new_york
dual_tf_momentum = london,new_york
dual_h4_momentum = london,new_york
m5_scalp_rsi = london,new_york
m5_scalp_rsi_h1 = london,new_york
m5_momentum_burst = london,new_york
# 复合/多时间框架策略
multi_timeframe_confirm = london,new_york
trend_triple_confirm = london,new_york
breakout_double_confirm = london,new_york
breakout_release_confirm = london,new_york
reversal_rejection_confirm = london,new_york
consensus = london,new_york

[htf_cache]
# 高时间框架信号方向缓存的最大存活时间（秒）
# 超过此时间的缓存条目视为过期，MultiTimeframeConfirmStrategy 将忽略过期方向。
# 默认 14400 秒 = 4 小时。
# 缩短到 1 小时（3600 秒），更适合黄金日内趋势节奏（原 4 小时过长）
max_age_seconds = 3600

[strategy_htf]
# 策略 HTF 指标的按需注入配置（纯 INI 驱动，策略代码无 HTF 声明）
# 格式：策略名.指标名 = 来源TF
# 策略 evaluate() 中通过 context.htf_indicators.get("TF", {}).get("指标名") 访问
# 未配置的策略不注入任何 HTF 数据

# ── HTF 联动入场策略 ──
# 原始：H1 定方向 + LTF(M5/M15/M30) 回调
htf_trend_pullback.supertrend14 = H1
htf_trend_pullback.adx14 = H1
htf_trend_pullback.ema50 = H1
# H4 定方向 + LTF(M30/H1) 回调
htf_h4_pullback.supertrend14 = H4
htf_h4_pullback.adx14 = H4
htf_h4_pullback.ema50 = H4
# M30 定方向 + M5 回调（短周期快速入场）
htf_m30_pullback.supertrend14 = M30
htf_m30_pullback.adx14 = M30
htf_m30_pullback.ema50 = M30
# 双 TF 动量共振（H1+LTF 同向 supertrend + 双 ADX 强）
dual_tf_momentum.supertrend14 = H1
dual_tf_momentum.adx14 = H1
dual_tf_momentum.ema50 = H1
# 双 TF 动量共振（H4+LTF）
dual_h4_momentum.supertrend14 = H4
dual_h4_momentum.adx14 = H4
dual_h4_momentum.ema50 = H4
# M5 快速标量：M30 定向 + M5 RSI 极值
m5_scalp_rsi.supertrend14 = M30
m5_scalp_rsi.adx14 = M30
# M5 快速标量：H1 定向 + M5 RSI 极值
m5_scalp_rsi_h1.supertrend14 = H1
m5_scalp_rsi_h1.adx14 = H1
# M5 动量突发：M30 方向 + M5 ADX/RSI 共振
m5_momentum_burst.supertrend14 = M30
m5_momentum_burst.adx14 = M30

# ── 趋势策略 ──
supertrend.supertrend14 = H1
supertrend.adx14 = H1
sma_trend.sma20 = D1
sma_trend.ema50 = D1
macd_momentum.macd = D1
fib_pullback.supertrend14 = H1
ema_ribbon.ema50 = H1
roc_momentum.adx14 = H1

# ── 突破策略 ──
bollinger_breakout.boll20 = H1
keltner_bb_squeeze.keltner20 = H1
keltner_bb_squeeze.boll20 = H1
donchian_breakout.donchian20 = H1
donchian_breakout.adx14 = H1
asian_range_breakout.atr14 = H1
multi_timeframe_confirm.ema50 = H4
multi_timeframe_confirm.sma20 = H4

# ── 均值回归 ──
rsi_reversion.rsi14 = M30
rsi_divergence.rsi14 = H1
cci_reversion.cci20 = M30

[htf_indicators]
# 跨时间框架指标注入全局开关
# false 时策略的 htf_indicators 声明被忽略，不进行任何 HTF 指标查询
enabled = true
# Intrabar（未收盘 bar）信号的置信度缩放因子
# 未收盘 bar 的指标值不稳定，适当降权减少虚假信号
# 1.0 = 不缩放，0.85 = 降低 15%
intrabar_confidence_factor = 0.85

[htf_alignment]
# HTF 方向对齐修正的细分系数（多维加权修正）。
# 整体开关 aligned_boost/conflict_penalty 在 [signal] 中配置。

# 强度系数：HTF 信号 confidence 偏离 0.5 时的放大/压缩幅度
# 公式：strength = 1.0 + (htf_confidence - 0.5) × strength_coefficient
# 范围 [0.85, 1.15]（当 coefficient=0.3 时）
strength_coefficient = 0.30

# 稳定性系数：HTF 方向连续保持的 bar 数量带来的额外加成
# 公式：stability = min(1.0 + (stable_bars - 1) × stability_per_bar, stability_cap)
stability_per_bar = 0.03
stability_cap = 1.15

# Intrabar 半强度：未收盘 bar 的 HTF 修正幅度按此比例缩小
# 公式：intrabar_mul = 1.0 + (raw_mul - 1.0) × intrabar_strength_ratio
intrabar_strength_ratio = 0.50

[signal_quality]
# 信号质量追踪器：发出信号后等待多少根 bar 再判定理论盈亏（N bars 后回填）
bars_to_evaluate = 5
# 内存中最多保留多少个待评估信号（超出时丢弃最旧的）
max_pending = 500

[market_structure]
market_structure_enabled = true
market_structure_lookback_bars = 400
market_structure_m1_lookback_bars = 120
market_structure_open_range_minutes = 60
market_structure_compression_window_bars = 6
market_structure_reference_window_bars = 24

[strategy_timeframes]
# 按策略限定允许运行的时间框架白名单。
# 不硬性移除策略——表现差的策略通过 regime_affinity_overrides 动态压制。
# 只做结构性限制（如均值回归不适合 H1 方向层，趋势策略不适合 M5 执行层）。
#
# ── H1 方向层（趋势策略为主）──
sma_trend = H1,H4
macd_momentum = H1,H4
supertrend = M15,M30,H1
roc_momentum = M15,M30,H1
trendline_3touch = H1,H4
#
# ── M15/M30 确认层 ──
fib_pullback = M15,M30
