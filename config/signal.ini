# ── 超时出场 ──
# 持仓超过 N 根 bar 且未达 breakeven 时退出。0 = 禁用
timeout_bars = 0

# ── 硬上界 TP ──
# 盈利达到 max_tp_r × R 时强制止盈
max_tp_r = 5.0

# ── R 单位保护 ──
# true = Chandelier multiplier 不得低于入场 SL ATR multiplier
# 防止 Chandelier 在入场时立即收紧 SL，导致 R 单位失真
enforce_r_floor = true


[exit_profile]
# Aggression 系数 α ∈ [0.0, 1.0]
# α 高 → 顺势（宽 trail, 低锁利, 晚 breakeven）
# α 低 → 逆势（紧 trail, 高锁利, 早 breakeven）
#
# 公式：
#   chandelier_atr_multiplier = 1.5 + 2.0 × α   → [1.5, 3.5]
#   lock_ratio                = 0.9 - 0.5 × α   → [0.4, 0.9]
#   breakeven_r               = 0.6 + 0.6 × α   → [0.6, 1.2]

# trend 策略
trend__trending = 0.85
trend__ranging = 0.15
trend__breakout = 0.65
trend__uncertain = 0.50

# reversion 策略
reversion__trending = 0.10
reversion__ranging = 0.80
reversion__breakout = 0.10
reversion__uncertain = 0.45

# breakout 策略
breakout__trending = 0.85
breakout__ranging = 0.10
breakout__breakout = 0.85
breakout__uncertain = 0.50


[exit_profile.tf_scale]
# Per-TF Chandelier trail 缩放因子
# 补偿不同 TF 的 ATR 统计特性差异：
#   低 TF: ATR 自相关低、尾部风险高 → 放宽 trail（>1.0）
#   高 TF: ATR 平滑、可预测性高 → 可略紧（<1.0）
M5 = 1.20
M15 = 1.10
M30 = 1.00
H1 = 1.00
H4 = 0.95
D1 = 0.90
