# Chandelier Exit 出场系统配置
# ═══════════════════════════════════════════════════════════════════════════

[chandelier]
# 是否启用 regime-aware profile 矩阵
# true = 按 (strategy_category, regime) 的 aggression 系数选择出场 profile
# false = 所有仓位使用 fallback_alpha 生成的统一 profile
