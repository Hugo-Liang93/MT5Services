# ═══════════════════════════════════════════════════════════════════════════════
# [regime_affinity.<strategy_name>] — Regime 亲和度覆盖
#
# 控制每个策略在不同行情类型下的置信度权重乘数（0.0 ~ 1.0）。
# 影响范围：仅影响指定策略。值越高，该策略在对应 Regime 下的信号越强。
#
# 未配置的策略使用代码中的默认亲和度。
# 只需列出需要调整的策略——不需要列出所有策略。
#
# 键：trending / ranging / breakout / uncertain
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# 价格确认入场（Pending Entry）
# 信号产生后不立即市价下单，等 Quote bid/ask 落入计算好的入场区间后执行
# ═══════════════════════════════════════════════════════════════════════════════
[pending_entry]
# 2026-04-06: 入场职责回归策略层（A7）。
# 入场区间由策略 _entry_spec() 输出（entry_type + entry_price + entry_zone_atr），
# PendingEntryManager 仅负责价格监控和执行。

# ── 价格监控 ──
check_interval = 0.5
# pending 期间额外 spread 上限（0=不做额外检查，复用 signal_filters）
max_spread_points = 0

# ── 超时（单位：bars 数量 × bar 周期秒数）──
timeout_bars_M5 = 2.0
timeout_bars_M15 = 1.5
timeout_bars_M30 = 1.2
timeout_bars_H1 = 1.0
timeout_bars_H4 = 0.5
timeout_bars_D1 = 0.25
default_timeout_bars = 2.0

# ── 新信号覆盖行为 ──
cancel_on_new_signal = true
# false = 同方向新信号不覆盖旧 pending（避免重复）
cancel_same_direction = false

# ═══════════════════════════════════════════════════════════════════════════
# 持仓出场配置（Chandelier Exit + regime-aware profile 矩阵）
# 已拆出到独立的 config/exit.ini，支持实例级覆盖。
# 参见 config/exit.ini 与 config/instances/<name>/exit.ini。
# ═══════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════════
# Intrabar 交易链路（从观测层升级为交易层）
#
# 核心设计：用低 TF 完整 K 线收盘事件（L1 可靠）替代 OHLC 快照轮询，
# 触发高 TF 策略盘中评估 → bar 计数稳定性 → 盘中入场。
# ═══════════════════════════════════════════════════════════════════════════════

[intrabar_trading]
# 主开关（默认关闭，现有行为完全不受影响）
enabled = false

# 父 TF bar 最小进度（0.0-1.0），避免 bar 刚开始就触发
min_parent_bar_progress = 0.15

# 稳定性：连续 N 根触发 TF bar 同方向才能入场
min_stable_bars = 3

# 盘中入场最低置信度（高于 confirmed 阈值）
min_confidence = 0.75

# 允许盘中交易的策略白名单（逗号分隔，空 = 无）
enabled_strategies =

# ATR 来源：last_confirmed（上一根确认父 TF bar 的 ATR）
atr_source = last_confirmed

# ── 跨 TF 触发映射 ──
# 每个父 TF 的盘中数据源 = 哪个子 TF 的 close 驱动
# 语义："H1 的盘中变化由 M5 close 驱动"
# 子 TF close → 从已确认子 TF bars 合成父 TF 当前 bar → 注入 intrabar 管道
# 已配置 trigger 的父 TF 不再使用定时轮询获取 intrabar 数据

[intrabar_trading.trigger]
M5 = M1
M15 = M1
M30 = M1
H1 = M5
H4 = M15
