# signal.ini — 信号生成与自动交易配置
#
# 控制信号策略的执行参数、仓位大小、过滤条件和状态机行为。
# [preview] 和 [position_management] 中的键名在加载时会被重命名（见注释）。

[signal]
# ── 自动交易 ──────────────────────────────────────────────────────────
# 是否启用自动下单（信号评估后自动执行交易）
# 默认 false，确保新部署时不会意外开仓。
auto_trade_enabled = false

# 自动下单所需的最低信号置信度（0.0~1.0）
auto_trade_min_confidence = 0.7

# 自动下单是否要求信号已处于 "armed" 状态
# true = 信号须经历 preview → armed 稳定窗口后才能触发下单
auto_trade_require_armed = true

# ── ATR 仓位计算 ───────────────────────────────────────────────────────
# 止损距离 = ATR × sl_atr_multiplier
sl_atr_multiplier = 1.5

# 止盈距离 = ATR × tp_atr_multiplier
tp_atr_multiplier = 3.0

# 每笔交易风险占账户净值的百分比（用于计算仓位手数）
risk_percent_per_trade = 1.0

# 单笔交易最小手数（受经纪商最小手数限制）
min_volume = 0.01

# 单笔交易最大手数
max_volume = 1.0

# ── 过滤条件 ────────────────────────────────────────────────────────────
# 最大允许买卖价差（点数）；超过此值的报价不触发信号
# XAUUSD 参考值：正常 20~30 点，50 点为宽松上限。
max_spread_points = 50

# 允许交易的交易时段（逗号分隔）
# 可选值: asia（亚盘）, london（欧盘）, newyork（美盘）
allowed_sessions = london,newyork

# 是否启用经济事件过滤器
# 启用后，重要经济数据发布窗口内不评估信号。
economic_filter_enabled = true

# 经济事件过滤展望窗口（分钟）：事件发布前多少分钟内暂停信号评估
economic_lookahead_minutes = 30

# 经济事件过滤回溯窗口（分钟）：事件发布后多少分钟内暂停信号评估
economic_lookback_minutes = 15

# 经济事件最低 importance 阈值（低于此值的事件不触发过滤）
economic_importance_min = 3

[preview]
# Intrabar 预览信号（preview/armed）状态机参数。
# 注意：以下键名在加载后会重命名，Pydantic 字段名见括号。

# 触发 preview 信号所需的最低置信度（→ SignalConfig.min_preview_confidence）
min_confidence = 0.55

# 触发 preview 信号所需的最低 bar 进度比例（0.0~1.0）
# 0.2 = bar 已经过 20% 时长后才开始评估（→ SignalConfig.min_preview_bar_progress）
min_bar_progress = 0.2

# 信号方向维持一致多少秒后才升级为 armed 状态（→ SignalConfig.preview_stable_seconds）
stable_seconds = 15

# 同一 preview 状态的两次发射之间的最小间隔（秒）（→ SignalConfig.preview_cooldown_seconds）
cooldown_seconds = 30

# Intrabar 快照去重窗口（秒）：相同指标值在此窗口内只评估一次
snapshot_dedupe_window_seconds = 1.0

[position_management]
# 移动止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时激活移动止损
trailing_atr_multiplier = 1.0

# 保本止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时将 SL 移至开仓价
breakeven_atr_threshold = 1.0

# 持仓状态与 MT5 终端的对账间隔（秒）（→ SignalConfig.position_reconcile_interval）
reconcile_interval = 10
