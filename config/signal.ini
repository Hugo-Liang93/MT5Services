# signal.ini — 信号生成与自动交易配置
#
# 控制信号策略的执行参数、仓位大小、过滤条件和状态机行为。
# [preview] 和 [position_management] 中的键名在加载时会被重命名（见注释）。

[signal]
# ── 自动交易 ──────────────────────────────────────────────────────────
# 是否启用自动下单（信号评估后自动执行交易）
# 默认 false，确保新部署时不会意外开仓。
auto_trade_enabled = false

# 自动下单所需的最低信号置信度（0.0~1.0）
auto_trade_min_confidence = 0.7

# 自动下单是否要求信号已处于 "armed" 状态
# true = 信号须经历 preview → armed 稳定窗口后才能触发下单
auto_trade_require_armed = true

# 同一品种允许的最大并发持仓数
max_concurrent_positions_per_symbol = 3

# London -> New York 时段切换前后冷却窗口（分钟）
session_transition_cooldown_minutes = 15

# ── ATR 仓位计算 ───────────────────────────────────────────────────────
# 止损距离 = ATR × sl_atr_multiplier
sl_atr_multiplier = 1.5

# 止盈距离 = ATR × tp_atr_multiplier
tp_atr_multiplier = 3.0

# 每笔交易风险占账户净值的百分比（用于计算仓位手数）
risk_percent_per_trade = 1.0

# 单笔交易最小手数（受经纪商最小手数限制）
min_volume = 0.01

# 单笔交易最大手数
max_volume = 1.0

# ── 过滤条件 ────────────────────────────────────────────────────────────
# 最大允许买卖价差（点数）；超过此值的报价不触发信号
# XAUUSD 参考值：正常 20~30 点，50 点为宽松上限。
max_spread_points = 50

# 允许交易的交易时段（逗号分隔）
# 可选值: asia（亚盘）, london（欧盘）, newyork（美盘）
allowed_sessions = london,newyork

# 是否启用经济事件过滤器
# 启用后，重要经济数据发布窗口内不评估信号。
economic_filter_enabled = true

# 经济事件过滤展望窗口（分钟）：事件发布前多少分钟内暂停信号评估
economic_lookahead_minutes = 30

# 经济事件过滤回溯窗口（分钟）：事件发布后多少分钟内暂停信号评估
economic_lookback_minutes = 15

# 经济事件最低 importance 阈值（低于此值的事件不触发过滤）
economic_importance_min = 3

# 波动率异常过滤：当前 ATR 超过 baseline ATR 的此倍数时，跳过策略评估
# 0 = 禁用，2.5 = ATR 暴增 2.5 倍时压制信号（防止突发行情下虚假信号）
volatility_atr_spike_multiplier = 2.5
# 日损失限制已统一到 risk.ini 的 daily_loss_limit_pct，
# 由 PreTradeRiskService 的 DailyLossLimitRule 统一执行。

[preview]
# Intrabar 预览信号（preview/armed）状态机参数。
# 注意：以下键名在加载后会重命名，Pydantic 字段名见括号。

# 触发 preview 信号所需的最低置信度（→ SignalConfig.min_preview_confidence）
min_confidence = 0.55

# 触发 preview 信号所需的最低 bar 进度比例（0.0~1.0）
# 黄金日内：M1 bar 共 60 秒，0.15 = 9 秒后开始评估（原 0.2 = 12 秒，差异不大）
# M5 时 0.15 = 45 秒，节省响应时间。
min_bar_progress = 0.15

# 信号方向维持一致多少秒后才升级为 armed 状态（→ SignalConfig.preview_stable_seconds）
# 黄金日内：M1 bar = 60 秒，15 秒 = 25% bar 长度，稳定性要求合理。
# M5 时 15 秒 = 5% bar，放宽为 10 秒可提前发现趋势，但噪声略增。
# 保持 15 秒以兼顾 M1 和 M5 场景。
stable_seconds = 15

# 同一 preview 状态的两次发射之间的最小间隔（秒）（→ SignalConfig.preview_cooldown_seconds）
# 黄金日内 M1：30 秒冷却 = 每根 bar 最多 2 次发射，避免重复噪声。合理。
cooldown_seconds = 30

# Intrabar 快照去重窗口（秒）：相同指标值在此窗口内只评估一次
# Bug修复：原值 1.0 对 M1 bar 过长——1 秒内可能有多个有效的不同指标快照。
# 降至 0.3 秒（300ms），确保每个有意义的价格变化都能被评估。
snapshot_dedupe_window_seconds = 0.3

[regime]
# Regime 亲和度预检（Pre-flight Affinity Gate）
#
# 策略在当前 Regime 下的 regime_affinity < min_affinity_skip 时，
# 直接跳过 evaluate() 调用，节省 CPU。
#
# 这是"白名单"式过滤：低于此值的策略在当前行情类型下可靠性极低，
# 跳过它们不会丢失有价值的信号，只会减少噪声。
#
# 参考：RANGING 时 ema_ribbon=0.10、donchian_breakout=0.15；
#        TRENDING 时 rsi_reversion=0.25、stoch_rsi=0.25。
# 设为 0.0 可禁用预检（评估全部策略，但更耗 CPU）。
min_affinity_skip = 0.25

# ── Delta Momentum Bonus（均值回归策略共享参数）───────────────────────
# d3 缩放系数：d3_bonus = min(d3 / scale, cap)
# delta_d3_scale = 10.0
# delta_d3_cap = 0.05
# d5 耗竭判定阈值和奖励：|d5| > threshold 时加 bonus
# delta_d5_threshold = 8.0
# delta_d5_bonus = 0.03

# Phase 3: 概率化 Regime 分类开关。
# true = 使用 soft regime 做 affinity 加权；false = 保持单一硬分类。
soft_regime_enabled = true

[voting]
# 跨策略多数表决引擎（Strategy Voting Engine）
#
# 同一 snapshot 所有策略评估完成后，对 confidence 加权求票，
# 额外发出一个 strategy="consensus" 的综合信号。
#
# consensus 信号与普通策略信号使用相同的状态机（preview/armed/confirmed），
# 可直接驱动自动交易，代表"多策略共识"的更高可信度决策。
enabled = true

# 买方或卖方权重占总权重的最低比例 → 产生方向性共识
# 0.40 = 40% 总 confidence 权重在同一方向 → 共识确立
consensus_threshold = 0.40

# 产生共识所需的最少"非 hold"策略数量
# 防止单一策略独自定论，要求至少 2 个策略形成合力
min_quorum = 2

# 方向分歧惩罚因子（0.0~1.0）
# 买卖双方都有较强权重时，说明市场方向不明，降低共识置信度。
# 最终置信度 ×= (1.0 - min_dir_ratio × disagreement_penalty)
# 0.5 = 完全分歧（买卖各半）时置信度降 50%
disagreement_penalty = 0.50

[position_management]
# 移动止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时激活移动止损
trailing_atr_multiplier = 1.0

# 保本止损触发阈值（ATR 倍数）：盈利达到 ATR × 此值时将 SL 移至开仓价
breakeven_atr_threshold = 1.0

# 持仓状态与 MT5 终端的对账间隔（秒）（→ SignalConfig.position_reconcile_interval）
reconcile_interval = 10
end_of_day_close_enabled = true
end_of_day_close_hour_utc = 21
end_of_day_close_minute_utc = 0

[circuit_breaker]
# 连续失败次数达到阈值后自动暂停自动交易（熔断开路）
max_consecutive_failures = 3

# T-3: 熔断开路后，自动尝试半开恢复的等待时间（分钟）
# 设为 0 禁用自动恢复（需手动调用 reset_circuit()）
circuit_auto_reset_minutes = 30

[contract_sizes]
# T-2: 按品种配置合约大小，用于仓位计算（ATR 风险法）
# 格式：品种名 = 合约大小（手）
# XAUUSD = 100（1 手 = 100 盎司黄金，标准 XAUUSD 规格）
XAUUSD = 100.0
# 通用默认值（未在此配置的品种使用此值）
default = 100.0

[timeframe_risk]
# 时间框架差异化风险乘数：effective_risk_pct = base_risk_percent × multiplier
# 留空则使用 sizing.py 的内置默认值（M1:0.50, M5:0.75, M15:1.00, H1:1.20）
# 取消注释可覆盖：
# M1 = 0.50
# M5 = 0.75
# M15 = 1.00
# H1 = 1.20

[session_spread_limits]
# 分时段动态 spread 上限（点），
# 未配置的 session 回退到 [signal].max_spread_points。
asia = 35
london = 45
newyork = 50
off_hours = 25

[strategy_sessions]
# 策略级 session 路由：在全局 allowed_sessions 内再细分每个策略何时参与。
# 趋势策略 — 仅在欧美盘流动性充足时运行
sma_trend = london,newyork
supertrend = london,newyork
macd_momentum = london,newyork
ema_ribbon = london,newyork
hma_cross = london,newyork
roc_momentum = london,newyork
session_momentum = london,newyork
# 突破策略 — 仅在欧美盘运行（亚盘假突破率高）
bollinger_breakout = london,newyork
donchian_breakout = london,newyork
keltner_bb_squeeze = london,newyork
fake_breakout = london,newyork
squeeze_release = london,newyork
# 均值回归策略 — 亚盘也可参与（XAUUSD 亚盘波动温和，回归有效）
rsi_reversion = asia,london
stoch_rsi = asia,london
williams_r = asia,london,newyork
cci_reversion = asia,london,newyork
price_action_reversal = asia,london,newyork
# 复合/多时间框架策略
multi_timeframe_confirm = london,newyork
trend_triple_confirm = london,newyork
breakout_double_confirm = london,newyork
breakout_release_confirm = london,newyork
reversal_rejection_confirm = london,newyork
consensus = london,newyork

[htf_cache]
# 高时间框架信号方向缓存的最大存活时间（秒）
# 超过此时间的缓存条目视为过期，MultiTimeframeConfirmStrategy 将忽略过期方向。
# 默认 14400 秒 = 4 小时。
max_age_seconds = 14400

[strategy_htf]
# 策略 HTF 指标的按需注入配置（纯 INI 驱动，策略代码无 HTF 声明）
# 格式：策略名.指标名 = 来源TF
# 策略 evaluate() 中通过 context.htf_indicators.get("TF", {}).get("指标名") 访问
# 未配置的策略不注入任何 HTF 数据

# ── 趋势策略 ──
supertrend.supertrend14 = H1
supertrend.adx14 = H1
sma_trend.sma20 = D1
sma_trend.ema50 = D1
macd_momentum.macd = D1

# ── 突破策略 ──
bollinger_breakout.boll20 = H1
keltner_bb_squeeze.keltner20 = H1
keltner_bb_squeeze.boll20 = H1
donchian_breakout.donchian20 = H1
donchian_breakout.adx14 = H1
multi_timeframe_confirm.ema50 = H1
multi_timeframe_confirm.sma20 = H1

# ── 均值回归 ──
rsi_reversion.rsi14 = M15

[htf_indicators]
# 跨时间框架指标注入全局开关
# false 时策略的 htf_indicators 声明被忽略，不进行任何 HTF 指标查询
enabled = true
# Intrabar（未收盘 bar）信号的置信度衰减因子
# 未收盘 bar 的指标值不稳定，适当降权减少虚假信号
# 1.0 = 不衰减，0.85 = 衰减 15%
intrabar_confidence_decay = 0.85

[htf_alignment]
# HTF 方向对齐修正参数 — 影响置信度管线的 HTF alignment 步骤。
# aligned_boost 和 conflict_penalty 由 [signal] 的同名字段控制。
# 以下是多维加权修正的细分系数：

# 强度系数：HTF 信号 confidence 偏离 0.5 时的放大/压缩幅度
# 公式：strength = 1.0 + (htf_confidence - 0.5) × strength_coefficient
# 范围 [0.85, 1.15]（当 coefficient=0.3 时）
strength_coefficient = 0.30

# 稳定性系数：HTF 方向连续保持的 bar 数量带来的额外加成
# 公式：stability = min(1.0 + (stable_bars - 1) × stability_per_bar, stability_cap)
stability_per_bar = 0.03
stability_cap = 1.15

# Intrabar 半强度：未收盘 bar 的 HTF 修正幅度按此比例缩小
# 公式：intrabar_mul = 1.0 + (raw_mul - 1.0) × intrabar_strength_ratio
intrabar_strength_ratio = 0.50

[signal_quality]
# 信号质量追踪器：发出信号后等待多少根 bar 再判定理论盈亏（N bars 后回填）
bars_to_evaluate = 5
# 内存中最多保留多少个待评估信号（超出时丢弃最旧的）
max_pending = 500

[market_structure]
market_structure_enabled = true
market_structure_lookback_bars = 400
market_structure_m1_lookback_bars = 120
market_structure_open_range_minutes = 60
market_structure_compression_window_bars = 6
market_structure_reference_window_bars = 24

[strategy_timeframes]
# 按策略限定允许运行的时间框架白名单（留空 = 不限制，允许所有已配置时间框架）。
#
# sma_trend / macd_momentum 使用中周期指标（SMA20/EMA50、MACD 12-26-9），
# 在 M1 分钟级别信噪比极差，仅在 H1 及以上才有统计意义。
# 限制后这两个策略只在 H1 K 线收盘时评估，显著减少 M1 噪声信号。
sma_trend = H1
macd_momentum = H1
rsi_reversion = M1,M5
stoch_rsi = M1,M5
supertrend = M1,M5
hma_cross = M1,M5
ema_ribbon = M5,M15
session_momentum = M5,M15
bollinger_breakout = M5,M15
donchian_breakout = M5,M15
keltner_bb_squeeze = M5,M15
fake_breakout = M5,M15
squeeze_release = M5,M15
price_action_reversal = M5,M15
trend_triple_confirm = M5,H1
breakout_double_confirm = M5,M15
breakout_release_confirm = M5,M15
reversal_rejection_confirm = M5,M15
multi_timeframe_confirm = M15,H1
# ROC 仍保持不限制，保留为补充型低滞后动量策略

[performance_tracker]
# 日内策略绩效追踪器（StrategyPerformanceTracker）
#
# 基于当前交易 session 的策略表现，动态调整置信度乘数。
# 与 ConfidenceCalibrator（长期统计校准）互补：
#   Calibrator = 7 天历史、DB、min_samples=50、每小时刷新
#   PerformanceTracker = 当前 session、纯内存、1 笔即生效、实时
#
# 置信度流水线位置：
#   raw_confidence × regime_affinity × performance_multiplier → calibrator → final

# 是否启用日内绩效追踪（false = get_multiplier 始终返回 1.0，无影响）
enabled = true

# 基准胜率：高于此值时微幅提升，低于时压制
baseline_win_rate = 0.50

# 乘数下限（防止单策略被过度压制）
min_multiplier = 0.50

# 乘数上限（防止过度乐观）
max_multiplier = 1.20

# 连败达到此值后触发额外压制
streak_penalty_threshold = 3

# 连败额外压制因子：每超过阈值 1 次，乘以此值
streak_penalty_factor = 0.90

# 单策略样本不足此值时，回退到同类策略的聚合绩效
category_fallback_min_samples = 3

# Session 自动重置间隔（小时），0 = 不自动重置
session_reset_interval_hours = 0

[execution_costs]
max_spread_to_stop_ratio = 0.33

[voting_groups]
# 多组 Voting 分组配置
# 格式：group_name = strategy1,strategy2,...
#
# 进入 voting group 的策略默认不允许单独触发交易，
# 只有 voting group 计算出的共识信号才能触发下单。
# 例外：写入 [standalone_override] strategies 的策略仍可单独触发。
#
# 未列入任何 group 的策略（solo 策略）不受此限制，可直接触发下单。

trend_vote     = supertrend,ema_ribbon,hma_cross,session_momentum
reversion_vote = rsi_reversion,stoch_rsi,williams_r,cci_reversion,price_action_reversal
breakout_vote  = bollinger_breakout,donchian_breakout,keltner_bb_squeeze,squeeze_release,fake_breakout

[voting_group.trend_vote]
# 趋势组：4 个 M1/M5/M15 趋势策略投票。
# macd_momentum(H1-only) 和 sma_trend(H1-only) 不在此组——
# 它们与 M1/M5 策略永远不在同一快照中，无法满足 min_quorum。
# 这两个 H1 策略作为 solo 策略独立触发，或通过 HTF Cache 间接影响。
consensus_threshold = 0.45
min_quorum = 2
disagreement_penalty = 0.50

[voting_group.reversion_vote]
# 回归组：均值回归策略相对宽松，40% 权重即可定论
consensus_threshold = 0.40
min_quorum = 2
disagreement_penalty = 0.50

[voting_group.breakout_vote]
# 突破组：3 个策略，需要较强一致性
consensus_threshold = 0.45
min_quorum = 2
disagreement_penalty = 0.40

[standalone_override]
# 虽然属于某个 voting group，但仍允许单独触发交易的策略名单（白名单覆盖）。
# 格式：strategies = strategy1,strategy2,...
# 空值 = 无覆盖（分组内策略全部遵守"只能通过 vote 结果触发"的规则）。
strategies =

[trade_triggers]
# 交易触发白名单（第二层过滤，在 voting group 保护之上叠加）。
# 空值 = 不额外限制（仅由 voting group 规则控制）。
#
# 分组后的默认触发逻辑（无需在此列出）：
#   ✓ 可触发：trend_vote / reversion_vote / breakout_vote（vote 结果信号）
#   ✓ 可触发：sma_trend / roc_momentum / multi_timeframe_confirm（未分组的 solo 策略）
#   ✓ 可触发：trend_triple_confirm / breakout_double_confirm / breakout_release_confirm / reversal_rejection_confirm（复合策略，未分组）
#   ✗ 不触发：supertrend/ema_ribbon/... 等分组内策略（除非加入 standalone_override）
#
# 若要进一步限制，取消注释并填写：
# allowed_strategies = trend_vote,reversion_vote,breakout_vote,trend_triple_confirm
allowed_strategies =

# ═══════════════════════════════════════════════════════════════════════════════
# [regime_detector] — Regime 行情分类器阈值
#
# 影响范围：全局。Regime 分类结果通过 regime_affinity 间接影响所有策略的置信度权重。
# 调低 adx_trending_threshold → 更多 K 线被判定为 TRENDING → 趋势策略更活跃。
# 调高 → 更保守，只有强趋势才激活趋势策略。
# ═══════════════════════════════════════════════════════════════════════════════
[regime_detector]
# ADX ≥ 此值 → TRENDING（趋势行情）
# 范围 [18, 30]。XAUUSD 推荐 23（平衡灵敏度和噪声过滤）
adx_trending_threshold = 23.0

# ADX < 此值 → RANGING（震荡行情）
# 范围 [12, 22]。低于此值且 BB 宽度 < bb_tight_pct 时判定为 BREAKOUT（蓄力）
adx_ranging_threshold = 18.0

# 布林带宽度（相对价格百分比）低于此值时，在 ADX < ranging 区间内判定为 BREAKOUT（蓄力盘整）
# 范围 [0.003, 0.015]。XAUUSD 推荐 0.008（0.8%）
bb_tight_pct = 0.008

# ═══════════════════════════════════════════════════════════════════════════════
# [strategy_params] — 策略级可调参数
#
# 格式：<strategy_name>__<param_name> = value
# 双下划线分隔策略名和参数名。参数名对应策略内部以 _ 开头的属性。
#
# 影响范围：仅影响指定策略。调整后该策略的信号产生频率和强度会改变。
# 未列出的参数使用代码中的默认值。
# ═══════════════════════════════════════════════════════════════════════════════
[strategy_params]
# ── 趋势策略 ADX 门槛 ─────────────────────────────────────────────────
# ADX 低于此值时策略返回 hold（不产生信号）
# 建议与 regime_detector.adx_trending_threshold 保持一致
# 范围 [18, 30]
supertrend__adx_threshold = 23.0
roc_momentum__adx_min = 23.0
donchian_breakout__adx_min = 23.0

# ── ROC 动量阈值 ──────────────────────────────────────────────────────
# ROC 绝对值超过此百分比才触发信号
# 范围 [0.05, 0.30]。XAUUSD M5 推荐 0.10
roc_momentum__roc_threshold = 0.1

# ── 均值回归策略阈值 ──────────────────────────────────────────────────
# RSI 超买超卖阈值（市场约定 30/70，可微调至 25/75 提高精度或 35/65 提高频率）
rsi_reversion__overbought = 75
rsi_reversion__oversold = 30

# Williams %R 超买超卖阈值（市场约定 -20/-80）
williams_r__overbought = -20
williams_r__oversold = -80

# CCI 超买超卖阈值（市场约定 ±100）
cci_reversion__upper_threshold = 150
cci_reversion__lower_threshold = -100

# Stochastic RSI K 线超买超卖阈值
stoch_rsi__overbought = 80
stoch_rsi__oversold = 20

# ── 时段动量策略 ──────────────────────────────────────────────────────
# 最低 ATR 百分比（低于此值视为波动不足，不产生信号）
# London 时段波动更大，阈值可更高
session_momentum__london_min_atr_pct = 0.00045
session_momentum__other_min_atr_pct = 0.00035

# ═══════════════════════════════════════════════════════════════════════════════
# [regime_affinity.<strategy_name>] — Regime 亲和度覆盖
#
# 控制每个策略在不同行情类型下的置信度权重乘数（0.0 ~ 1.0）。
# 影响范围：仅影响指定策略。值越高，该策略在对应 Regime 下的信号越强。
#
# 未配置的策略使用代码中的默认亲和度。
# 只需列出需要调整的策略——不需要列出所有策略。
#
# 键：trending / ranging / breakout / uncertain
# ═══════════════════════════════════════════════════════════════════════════════

