[research]
# Forward horizon 覆盖 Chandelier trailing 持仓期望（~20-50 bar），避免短 FR
# 与实盘 exit 模型错配（docs/research-system.md 顶部 "血教训" 段落）。
# 3/10/30/60：H1 下覆盖 3 小时~2.5 天；M15 下 45 分钟~15 小时。
forward_horizons = 3,10,30,60
# 指标预热 bar 数（与回测共享）
warmup_bars = 200
# 训练集/测试集切分比例
train_ratio = 0.70
# 单次往返交易成本（百分比），扣除 forward_return
# XAUUSD 真实值 ≈ spread 0.15-0.30 pts/2000 + commission + 典型滑点 ≈ 0.07-0.10%
# 定期按 broker 实际成交成本审视此值（broker 换仓/点差变化 → 需要重估）
round_trip_cost_pct = 0.08

[overfitting]
# 每个桶（regime×direction）的最小样本数
min_samples = 30
# 最小 |相关系数| 才报告为"有意义"
min_correlation = 0.05
# 最小命中率偏离 50% 才报告
min_hit_rate_deviation = 0.03
# 阈值扫描的交叉验证折数
cv_folds = 5
# CV 一致性低于此值标记为"脆弱"
cv_consistency_threshold = 0.60
# 多重检验校正方法: bonferroni | bh_fdr
correction_method = bh_fdr
# CV 模式: expanding（训练窗口逐步扩大）| sliding（固定窗口滑动）
cv_mode = expanding

[threshold_sweep]
# 阈值扫描点数
sweep_points = 50
# 优化目标: hit_rate | mean_return | sharpe | expectancy
# expectancy = hit_rate × avg_win - (1-hit_rate) × avg_loss
target_metric = expectancy
# 是否按 regime 分层扫描
per_regime = true
# 排列检验参数（验证最优阈值是否显著）
# block size 由 auto_block_size() 根据 ACF 衰减自适应确定
n_permutations = 200
permutation_significance = 0.05

[predictive_power]
# 显著性水平（多重比较校正前）
significance_level = 0.05
# 是否按 regime 分别分析
per_regime = true
# Rolling IC 窗口大小（IR 已校正重叠窗口偏差）
rolling_ic_enabled = true
rolling_ic_window = 60
min_ir_threshold = 0.5
# 排列检验（block size 自适应，p-value 优先用于 BH-FDR 校正）
permutation_test_enabled = true
n_permutations = 1000

[rule_mining]
# 决策树最大深度（3=最多3个条件组合）
max_depth = 3
# 叶节点最小样本数
min_samples_leaf = 30
# 训练集最低命中率
min_hit_rate = 0.55
# 测试集最低命中率
min_test_hit_rate = 0.52
# 最多输出规则数
max_rules = 20
# 仅使用无量纲特征
dimensionless_only = true
# 排列检验：打乱标签后训练树，验证 hit_rate 是否显著
n_permutations = 200
permutation_significance = 0.05
# CV 一致性：规则至少在多少比例的 fold 中出现
cv_folds = 5
cv_consistency_threshold = 0.40

[feature_engineering]
# 是否启用派生特征
enabled = true
# 要计算的特征列表（逗号分隔，空=全部）
# 可选: momentum_consensus, regime_entropy, bars_in_regime
features =

[feature_providers]
# 各 Provider 启用开关
temporal = true
microstructure = true
cross_tf = false
regime_transition = true
session_event = true
intrabar = true
# BH-FDR 分组方式: by_provider | global | none
fdr_grouping = by_provider

[feature_providers.temporal]
core_indicators = rsi14,adx14
aux_indicators = macd_histogram,cci20,roc12,stoch_k
windows = 3,5,10
cross_levels_rsi = 30,50,70
cross_levels_adx = 20,25

[feature_providers.microstructure]
lookback = 5

[feature_providers.cross_tf]
# 格式: 子TF:父TF（逗号分隔）
parent_tf_map = M15:H1,M30:H4,H1:H4,H4:D1
parent_indicators = supertrend_direction,rsi14,adx14,ema50,bb_position

[feature_providers.regime_transition]
history_window = 50
prob_delta_window = 5
