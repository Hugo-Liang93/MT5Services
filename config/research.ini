[research]
# 前瞻收益计算的 bar 数（逗号分隔）
forward_horizons = 1,3,5,10
# 指标预热 bar 数（与回测共享）
warmup_bars = 200
# 训练集/测试集切分比例
train_ratio = 0.70
# 单次往返交易成本（百分比），扣除 forward_return
# XAUUSD 约 spread + commission ≈ 0.03-0.05%
round_trip_cost_pct = 0.04

[overfitting]
# 每个桶（regime×direction）的最小样本数
min_samples = 30
# 最小 |相关系数| 才报告为"有意义"
min_correlation = 0.05
# 最小命中率偏离 50% 才报告
min_hit_rate_deviation = 0.03
# 阈值扫描的交叉验证折数
cv_folds = 5
# CV 一致性低于此值标记为"脆弱"
cv_consistency_threshold = 0.60
# 多重检验校正方法: bonferroni | bh_fdr
correction_method = bh_fdr

[threshold_sweep]
# 阈值扫描点数
sweep_points = 50
# 优化目标: hit_rate | mean_return | sharpe | expectancy
target_metric = expectancy
# 是否按 regime 分层扫描
per_regime = true
# 排列检验参数（验证最优阈值是否显著）
n_permutations = 200
permutation_significance = 0.05

[predictive_power]
# 显著性水平（多重比较校正前）
significance_level = 0.05
# 是否按 regime 分别分析
per_regime = true
# Rolling IC 窗口大小
rolling_ic_enabled = true
rolling_ic_window = 60
min_ir_threshold = 0.5
# 排列检验
permutation_test_enabled = true
n_permutations = 1000

[feature_engineering]
# 是否启用派生特征
enabled = true
# 要计算的特征列表（逗号分隔，空=全部）
# 可选: di_spread, momentum_consensus, squeeze_score, vwap_gap_atr,
#        rsi_accel, regime_entropy, bars_in_regime
features =

