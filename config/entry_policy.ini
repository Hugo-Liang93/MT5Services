; EntryPolicy 配置（ADR-013）
;
; 本文件定义可插拔入场策略：
;   - [registry] 哪些 policy 注册到 EntryPolicyRegistry
;   - [default]  strategy_mapping 未命中时的兜底 policy
;   - [mapping]  strategy_name → policy_name
;   - [mapping_per_tf] strategy_name.tf → policy_name（覆盖 mapping）
;   - [policy_params.<name>] 各 policy 的参数
;   - [policy_params_per_tf.<name>.<tf>] per-tf 参数覆盖
;   - [fill_semantics] 回测同 bar 多 member 触发时的 tie-break
;
; P3 上线（2026-04-30）：5 policy 全部启用；mapping 推荐配置已下发；OCO 双
; member 触发将在 P4 上线，当前 oco_pullback_breakout 策略走单 member 路径
; （首成员 = LIMIT pullback）。
;
; 调优请写 entry_policy.local.ini（gitignored），不要修改本基线文件。

[registry]
enabled = market,pullback,breakout,oco_pullback_breakout,fib_pullback

[default]
policy = market

; ──────────────────────────────────────────────────────────────────
; strategy_name → policy_name 映射推荐
; 设计原则：
;   - 形态识别类（pin/engulfing/big bar）→ pullback（影线回踩，A 方案）
;   - 突破跟随/区间突破类 → breakout（创新高/低后挂 STOP，B 方案）
;   - 双向不确定（既怕追高又怕错过）→ oco_pullback_breakout（A+B）
;   - 趋势线触碰 → fib_pullback（自带 trendline_price，fib 回撤更精细）
;   - 强趋势追单/挖掘规则 barrier → market（不等回踩）
; ──────────────────────────────────────────────────────────────────

[mapping]
; 2026-05-04：M1/M5 高频原型走 confirmed-bar market entry，不接 tick-to-order。
structured_micro_momentum = market
structured_price_action = oco_pullback_breakout
structured_mined_rule   = market

; ──────────────────────────────────────────────────────────────────
; per-TF 覆盖：低 TF 风险高、节奏快；高 TF 节奏慢、波动大
; ──────────────────────────────────────────────────────────────────

[mapping_per_tf]
; M5 风险高不用 OCO，仅 pullback
structured_price_action.M5 = pullback

; ──────────────────────────────────────────────────────────────────
; Policy 参数
; ──────────────────────────────────────────────────────────────────

[policy_params.market]
; market policy 不读参数。

[policy_params.pullback]
zone_atr     = 0.10
wick_pct     = 0.50
branch_pin_bull_offset       = 0.05
branch_pin_bear_offset       = 0.05
branch_hammer_offset         = 0.05
branch_shooting_star_offset  = 0.05
branch_engulfing_bull_offset = 0.10
branch_engulfing_bear_offset = 0.10
branch_big_bar_bull_offset   = 0.10
branch_big_bar_bear_offset   = 0.10
branch_three_soldiers_offset = 0.15
branch_three_crows_offset    = 0.15
branch_rejection_bull_offset = 0.20
branch_rejection_bear_offset = 0.20
branch_sweep_reversal_offset = 0.15
branch_trendline_touch_bull_offset = 0.10
branch_trendline_touch_bear_offset = 0.10

[policy_params.breakout]
lookback_bars = 1
buffer_atr    = 0.05
zone_atr      = 0.05

[policy_params.oco_pullback_breakout]
cancellation_policy = any_fill
; pullback / breakout 各自参数从对应 [policy_params.*] section 继承

[policy_params.fib_pullback]
fib_levels     = 0.382,0.5,0.618
swing_lookback = 20
zone_atr       = 0.10

; ──────────────────────────────────────────────────────────────────
; per-TF 参数覆盖
; ──────────────────────────────────────────────────────────────────

[policy_params_per_tf.pullback.M15]
zone_atr = 0.15

[policy_params_per_tf.pullback.M30]
zone_atr = 0.12

[policy_params_per_tf.breakout.H1]
buffer_atr = 0.10

[policy_params_per_tf.breakout.H4]
buffer_atr = 0.15

[fill_semantics]
tie_break = limit_first
