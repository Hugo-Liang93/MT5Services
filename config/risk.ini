# risk.ini — 风险管理规则配置
#
# 所有下单请求在执行前都会经过此处定义的规则校验。
# 空值（留空）表示不限制（None）；填写数字则启用对应上限。
# 个人风险参数请配置在 config/risk.local.ini（已被 .gitignore 忽略）。

[risk]
# 是否启用风险管理模块
# 设为 false 则跳过所有下方规则检查（仅用于测试，生产环境请保持 true）。
enabled = true

# 最终交易执行允许发生的 session（→ risk.local.ini）
allowed_sessions =

# 单个品种允许同时持有的最大仓位数（1 = 单品种单仓，禁止对冲）
max_positions_per_symbol =

# 所有品种合计允许同时持有的最大仓位数
max_open_positions_total =

# 单个品种允许同时挂起的最大挂单数（留空 = 不限制）
max_pending_orders_per_symbol =

# 单笔市价单允许的最大交易量（手，→ risk.local.ini）
max_volume_per_order =

# 单个品种所有持仓合计允许的最大交易量（手，→ risk.local.ini）
max_volume_per_symbol =

# 单个品种同方向净手数上限（跨 TF 聚合，留空 = 不限制）
max_net_lots_per_symbol =

# 当日亏损达到账户净值的该百分比后停止新交易（→ risk.local.ini）
daily_loss_limit_pct =

# 市价单保护模式（收敛配置）：
# off = 不强制保护；sl = 必须有止损；sl_or_tp = 至少有 SL/TP 之一
market_order_protection = sl

# 保证金安全系数（→ risk.local.ini）
margin_safety_factor =

# 风控事实源不可用时的策略：
# warn_only = 记录告警后放行；fail_closed = 拒绝新单。
# live 实例应在实例级 local 覆盖为 fail_closed。
data_unavailable_policy = warn_only

# 每日最大交易次数（防止过度交易）
max_trades_per_day =

# 每小时最大交易次数（→ risk.local.ini）
max_trades_per_hour =

[risk_profile_bindings]
# 普通 K 线策略未配置时默认使用 standard_kline。
# tick-derived recovery/martingale runner 显式使用 recovery_budgeted。
tick_martingale_probe = recovery_budgeted

[risk_profiles.standard_kline]
policy = standard_kline
trade_frequency_enabled = true
pre_trade_rules = account_snapshot,daily_loss_limit,margin_availability,trade_frequency,protection,session_window,market_structure,economic_event,calendar_health

[risk_profiles.recovery_budgeted]
policy = recovery_budgeted
# recovery/martingale 不使用通用 max_trades_per_hour/day 作为主控；
# 它使用本 profile 的整体亏损预算；runner 只选择 risk_profile。
trade_frequency_enabled = false
# recovery 默认保留账户快照、日亏损、保证金、保护性止损、交易时段、
# 经济事件与日历健康；不启用通用交易频率和普通 K 线 market_structure 规则。
pre_trade_rules = account_snapshot,daily_loss_limit,margin_availability,protection,session_window,economic_event,calendar_health
max_daily_recovery_loss_amount =
max_rolling_recovery_loss_amount =
rolling_loss_window_minutes = 60
max_consecutive_loss_cycles = 0
loss_lockout_minutes = 0

[preflight_risk_policy]
# live preflight 对实例风控覆盖的准入门槛。
# 这些值不是实际下单风控上限；它们定义“live 实例配置是否足够保守”。
live_max_positions_per_symbol = 3
live_max_volume_per_order = 0.03
live_max_volume_per_symbol = 0.03
live_max_daily_loss_limit_pct = 5.0

[recovery_execution_canary]
# bounded recovery / martingale 扩仓执行 canary。
# 默认关闭；即使开启也默认 dry_run。真实 demo/live 下单必须在实例级 local
# 显式覆盖 enabled=true 且 dry_run=false，并先通过 replay + trace 验收。
enabled = false
dry_run = true
order_kind = market
deviation = 20
magic = 0
comment_prefix = recovery
# 市价 recovery 扩仓必须有保护性 SL。默认留空；实例级 canary 必须显式给出。
protective_stop_points =

[recovery_runtime_runner]
# 常驻 tick-derived bounded recovery runner。
# 这是独立应用服务，不属于普通 SignalStrategy 链路；默认关闭。
# 默认保持 demo + dry_run。若实例级 local 显式设置 dry_run=false，
# runner 仍只允许 demo account，并通过 trading port、pre-trade risk、ticket cleanup 合同执行。
enabled = false
dry_run = true
demo_only = true
symbol = XAUUSD
direction = buy
strategy = tick_martingale_probe
timeframe = TICK
base_volume = 0.01
multiplier = 2.0
max_steps = 1
max_total_volume = 0.03
max_next_volume = 0.02
step_distance_points = 80
# 0 表示禁用。启用后，补仓触发时若逆向距离已超过该值，则不继续加仓。
max_step_adverse_move_points = 0
recovery_target_points = 5
point = 0.01
min_step_interval_ms = 0
volume_step = 0.01
contract_size = 100
direction_mode = fixed
min_directional_move_points = 0
# 0 表示不限制。用于拒绝过度延展的 spike 末端追单。
max_directional_move_points = 0
min_pressure_delta = 0
max_entry_spread_points =
slippage_budget_points = 0
commission_points = 0
min_net_profit_points = 0
# cycle 级退出合同；0 表示禁用，max_steps_exit_mode 支持 hold / close_cycle。
max_cycle_loss_points = 0
max_cycle_duration_seconds = 0
max_steps_exit_mode = hold
# 达到最大补仓层后的最大持仓秒数；0 表示禁用。
max_steps_hold_seconds = 0
# 初始入场方向需要连续确认的 tick feature 快照数量；0/1 表示禁用。
entry_confirmation_snapshots = 1
entry_confirmation_max_gap_seconds = 3
order_kind = market
deviation = 20
magic = 0
comment_prefix = recovery-runner
protective_stop_points = 80
max_cycles_per_session = 1
max_cycles_per_day = 0
# 新 cycle admission 节奏控制；0 表示禁用。
min_cycle_interval_seconds = 0
cooldown_after_cycle_close_seconds = 0
max_cycles_per_hour = 0
snapshot_stale_seconds = 5
blocked_dispatch_retry_seconds = 30
# 真实 demo 下单前的成本标定 guard。dry_run 不受阻断；dry_run=false 时，
# 需要 recent calibration 样本证明 target_shortfall 收敛且 net_margin 为正。
real_trade_calibration_guard_enabled = true
real_trade_calibration_min_samples = 50
real_trade_calibration_max_target_shortfall_p90_points = 0
real_trade_calibration_min_net_margin_p50_points = 0
risk_profile = recovery_budgeted

[margin_guard]
# 保证金水位监控（margin_level = equity / margin * 100）
# 具体阈值请配置在 risk.local.ini

# 是否启用（→ risk.local.ini）
enabled =

# ── 告警阈值（→ risk.local.ini）──
warn_level =
danger_level =
critical_level =

# ── 动作阈值（→ risk.local.ini）──
block_new_trades_level =
tighten_stops_level =
tighten_stops_factor = 0.6
emergency_close_level =
emergency_close_strategy = worst_first
# 紧急平仓冷却（秒）：避免 reconcile 循环内连续平仓
emergency_close_cooldown = 30
