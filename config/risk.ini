# risk.ini — 风险管理规则配置
#
# 所有下单请求在执行前都会经过此处定义的规则校验。
# 空值（留空）表示不限制（None）；填写数字则启用对应上限。

[risk]
# 是否启用风险管理模块
# 设为 false 则跳过所有下方规则检查（仅用于测试，生产环境请保持 true）。
enabled = true

# 最终交易执行允许发生的 session。
# 留空 = 不做 session 级最终风控。
allowed_sessions = asia,london,newyork

# 单个品种允许同时持有的最大仓位数（留空 = 不限制）
max_positions_per_symbol =

# 所有品种合计允许同时持有的最大仓位数（留空 = 不限制）
max_open_positions_total =

# 单个品种允许同时挂起的最大挂单数（留空 = 不限制）
max_pending_orders_per_symbol =

# 单笔市价单允许的最大交易量（手，留空 = 不限制）
max_volume_per_order =

# 单个品种所有持仓合计允许的最大交易量（手，留空 = 不限制）
max_volume_per_symbol =

# 当日亏损达到账户净值的该百分比后停止新交易（留空 = 不限制）
daily_loss_limit_pct = 3.0

# 市价单是否强制要求设置止损（SL）
# true = 无 SL 的市价单被拒绝
require_sl_for_market_orders = false

# 市价单是否强制要求设置止损或止盈中的至少一个
# true = 既无 SL 又无 TP 的市价单被拒绝
require_tp_or_sl_for_market_orders = false
