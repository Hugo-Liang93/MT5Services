# risk.ini — 风险管理规则配置
#
# 所有下单请求在执行前都会经过此处定义的规则校验。
# 空值（留空）表示不限制（None）；填写数字则启用对应上限。

[risk]
# 是否启用风险管理模块
# 设为 false 则跳过所有下方规则检查（仅用于测试，生产环境请保持 true）。
enabled = true

# 最终交易执行允许发生的 session。
# 留空 = 不做 session 级最终风控。
allowed_sessions = asia,london,newyork

# 单个品种允许同时持有的最大仓位数（1 = 单品种单仓，禁止对冲）
max_positions_per_symbol = 

# 所有品种合计允许同时持有的最大仓位数
max_open_positions_total = 

# 单个品种允许同时挂起的最大挂单数（留空 = 不限制）
max_pending_orders_per_symbol = 2

# 单笔市价单允许的最大交易量（手，留空 = 不限制）
max_volume_per_order = 0.1

# 单个品种所有持仓合计允许的最大交易量（手，留空 = 不限制）
max_volume_per_symbol = 0.3

# 当日亏损达到账户净值的该百分比后停止新交易（留空 = 不限制）
daily_loss_limit_pct = 10.0

# 市价单是否强制要求设置止损（SL）
# true = 无 SL 的市价单被拒绝
require_sl_for_market_orders = true

# 市价单是否强制要求设置止损或止盈中的至少一个
# true = 既无 SL 又无 TP 的市价单被拒绝
require_tp_or_sl_for_market_orders = false

# 保证金安全系数：要求可用保证金 >= 预估保证金 × 此值（1.2 = 20% 安全余量）
# 设为 0 或留空 = 不检查保证金
margin_safety_factor = 1.2

# 每日最大交易次数（防止过度交易）
max_trades_per_day = 

# 每小时最大交易次数（防止信号风暴期密集开仓）
max_trades_per_hour = 10

[margin_guard]
# 保证金水位监控（margin_level = equity / margin * 100）
# 交易商 40% 强平线，需在此之前分级预警和干预。
enabled = true

# ── 告警阈值（前端展示，不触发后端动作）──
# margin_level < warn → 黄色预警
warn_level = 200
# margin_level < danger → 橙色警告
danger_level = 150
# margin_level < critical → 红色紧急
critical_level = 100

# ── 动作阈值（后端自动执行）──
# margin_level < 此值 → 禁止开新仓（比 margin_safety_factor 更早拦截）
block_new_trades_level = 200
# margin_level < 此值 → 收紧所有持仓的 trailing stop 距离
# tighten_factor: 原始 ATR 乘数 × 此因子（0.6 = 收紧到 60%）
tighten_stops_level = 150
tighten_stops_factor = 0.6
# margin_level < 此值 → 主动平掉亏损最大的仓位（在交易商强平之前）
# strategy: worst_first = 平亏损最大的一仓，all = 全平
emergency_close_level = 80
emergency_close_strategy = worst_first
# 紧急平仓冷却（秒）：避免 reconcile 循环内连续平仓
emergency_close_cooldown = 30
