; StorageWriter channels configuration.
; Each section defines one channel. Fields:
; type: ticks | quotes | intrabar | ohlc | ohlc_indicators | economic_calendar | economic_calendar_updates
; maxsize: queue max size
; flush_interval: seconds between flush attempts
; batch_size: batch threshold
; page_size: DB batch page size (optional)
; enabled: true/false (optional, combined with defaults)
;
; Global [storage] options:
; queue_full_policy: auto | block | drop_oldest | drop_newest
; queue_put_timeout: seconds used when queue_full_policy=block

[storage]
queue_full_policy = auto
queue_put_timeout = 0.25
quote_flush_enabled = true
# Explicit flag for intrabar writes; must be true for intrabar data to reach DB.
# Combined with the per-channel [intrabar] enabled flag (both must be true).
intrabar_enabled = true

[ticks]
type = ticks
maxsize = 20000
flush_interval = 1.0
batch_size = 1000
page_size = 1000

[quotes]
type = quotes
maxsize = 5000
flush_interval = 1.0
batch_size = 200
enabled = true
page_size = 1000

[intrabar]
type = intrabar
maxsize = 10000
flush_interval = 5.0
batch_size = 200
enabled = true
page_size = 1000
# drop_newest: intrabar is best-effort; prefer fresh ticks over blocking ingestion.
full_policy = drop_newest

[ohlc]
type = ohlc
maxsize = 5000
flush_interval = 1.0
batch_size = 200
page_size = 1000
# block: OHLC bar closes must not be lost; accept a short backpressure delay.
full_policy = block

[ohlc_indicators]
type = ohlc_indicators
maxsize = 5000
flush_interval = 1.0
batch_size = 200
page_size = 1000
# block: indicator results are coupled to OHLC bars; losing them breaks history.
full_policy = block

[economic_calendar]
type = economic_calendar
maxsize = 1000
flush_interval = 2.0
batch_size = 100
page_size = 500

[economic_calendar_updates]
type = economic_calendar_updates
maxsize = 2000
flush_interval = 2.0
batch_size = 200
page_size = 500
