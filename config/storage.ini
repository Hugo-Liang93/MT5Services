# storage.ini — StorageWriter 多通道持久化配置
#
# 每个 [section] 定义一个独立的异步写入通道，对应一类数据写入 TimescaleDB。
# 通道之间队列完全隔离，互不阻塞。
#
# 通道字段说明：
#   type           数据类型标识，与代码内部通道名对应（不可修改）
#   maxsize        队列最大容量（条）；超出后触发 full_policy
#   flush_interval 定时刷写间隔（秒）；到达时批量写入 DB
#   batch_size     批写阈值（条）；队列积压达到此值时立即触发写入
#   page_size      单次 DB 写入的最大条数（分页保护）
#   enabled        是否启用该通道（可选，默认 true）
#   full_policy    队列满时的溢出策略（可选，覆盖全局 queue_full_policy）
#
# full_policy 可选值：
#   auto          自动选择：优先 block，队列持续满则降级为 drop_oldest
#   block         阻塞生产者直至队列有空位（适合不可丢失的数据）
#   drop_oldest   丢弃队列中最旧的条目，插入最新的（适合实时性优先的数据）
#   drop_newest   丢弃新到达的条目，保留队列中已有的（适合批量历史数据）

[storage]
# 全局队列满溢出策略（可被各通道 full_policy 覆盖）
queue_full_policy = auto

# 当 full_policy = block 时，单次 put() 的最大等待时间（秒）
queue_put_timeout = 0.25

# 是否启用报价（quotes）通道持久化
quote_flush_enabled = true

# 是否启用 Intrabar 通道持久化（全局开关）
# 需同时与 [intrabar] enabled = true 均为 true 才会实际写入。
intrabar_enabled = true

[ticks]
type = ticks
maxsize = 20000
flush_interval = 1.0
batch_size = 1000
page_size = 1000
# 默认使用全局 full_policy（auto），Tick 数据实时性优先，允许丢弃旧数据。

[quotes]
type = quotes
maxsize = 5000
flush_interval = 1.0
batch_size = 200
page_size = 1000
enabled = true
# 默认使用全局 full_policy（auto）。

[intrabar]
type = intrabar
maxsize = 10000
flush_interval = 5.0
batch_size = 200
page_size = 1000
enabled = true
# drop_newest：Intrabar 是尽力而为数据，已在队列中的较旧数据优先入库，
# 丢弃新到达的重复更新，避免阻塞采集线程。
full_policy = drop_newest

[ohlc]
type = ohlc
maxsize = 5000
flush_interval = 1.0
batch_size = 200
page_size = 1000
# block：K 线收盘数据不可丢失，背压（短暂等待）优于数据缺口。
full_policy = block

[ohlc_indicators]
type = ohlc_indicators
maxsize = 5000
flush_interval = 1.0
batch_size = 200
page_size = 1000
# block：指标结果与 OHLC K 线强关联，丢失会导致历史指标断档。
full_policy = block

[economic_calendar]
type = economic_calendar
maxsize = 1000
flush_interval = 2.0
batch_size = 100
page_size = 500
# 默认使用全局 full_policy（auto）。经济日历数据更新频率低，一般不会触发溢出。

[economic_calendar_updates]
type = economic_calendar_updates
maxsize = 2000
flush_interval = 2.0
batch_size = 200
page_size = 500
# 默认使用全局 full_policy（auto）。
