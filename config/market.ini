# market.ini — API 服务配置
#
# 仅包含与 HTTP 服务相关的参数。
# 品种、时间框架、缓存限制等共享参数统一在 app.ini 中定义。
# 敏感配置（api_key）建议写入 config/market.local.ini（已被 .gitignore 忽略）。

[api]
# API 服务绑定地址（0.0.0.0 表示监听所有网卡）
host = 0.0.0.0

# API 服务监听端口
port = 8808

# 是否启用 CORS（跨域资源共享）
# 注意：CORS 通配符 * 与 allow_credentials=True 不兼容；
# 如需认证 + 跨域，请在 market.local.ini 中配置具体的 allowed_origins。
enable_cors = true

# 是否启用 Swagger UI 文档（/docs）
docs_enabled = true

# 是否启用 ReDoc 文档（/redoc）
redoc_enabled = true

[security]
# 是否启用 API Key 认证
# 启用后所有请求须携带 X-API-Key 请求头（或自定义 api_key_header）。
auth_enabled = false

# API Key 请求头名称
api_key_header = X-API-Key

# API Key 值
# ⚠️ 不建议将真实密钥提交到版本库。
#    推荐做法：将密钥写入 config/market.local.ini（被 .gitignore 忽略）。
api_key =

[logging]
# 是否记录每条 HTTP 请求日志
access_log_enabled = true

# 日志格式字符串
# 注意：configparser 中 % 需转义为 %%
log_format = "%%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s"
