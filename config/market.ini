# market.ini - API服务特有配置
# 共享配置从 app.ini 继承

[api]
# API特有配置（不共享）
# 注意：trading.*, intervals.*, limits.* 从 app.ini 继承

# API服务绑定地址
host = 0.0.0.0
port = 8808

# 是否启用CORS
enable_cors = true

# API文档设置
docs_enabled = true
redoc_enabled = true

[security]
# API认证配置（如果需要）
auth_enabled = false
api_key_header = X-API-Key
api_key =

[logging]
# API特有日志配置
access_log_enabled = true
# 注意: 使用 %% 转义 % 符号，避免configparser插值错误
log_format = "%%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s"
