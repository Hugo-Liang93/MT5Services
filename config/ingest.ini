# ingest.ini — 数据采集模块配置
#
# 仅包含采集模块特有参数。
# 品种列表、时间框架、采集间隔等共享参数统一在 app.ini 中定义。

[ingest]
# 服务启动时回溯拉取的历史 Tick 时间窗口（秒）
# 用于在内存缓冲区预填历史数据，确保启动后立即可用。
tick_initial_lookback_seconds = 20

# OHLC 历史回填最大条数（每个品种/时间框架组合）
# 影响指标计算可用的历史深度，需 >= indicators.json 中最大 min_bars。
ohlc_backfill_limit = 500

# MT5 数据拉取失败时的重试次数
retry_attempts = 3

# 重试退避系数（秒）；第 n 次重试等待 retry_backoff * n 秒
retry_backoff = 1.0

# MT5 终端连接超时（秒）
connection_timeout = 10.0

# Intrabar（未收盘 K 线）全局采样间隔（秒）
# 0 = 自动计算：max(5, 时间框架秒数 * 0.05)
# 可被 [ingest.intrabar_intervals] 按时间框架覆盖。
intrabar_interval = 0

[ingest.intrabar_intervals]
# 按时间框架覆盖 Intrabar 采样间隔（秒）。
# 未列出的时间框架使用上方 intrabar_interval 计算的全局值。
# M1 = 5.0
# M5 = 15.0
# H1 = 60.0

[error_recovery]
# 品种连续采集失败次数超过此阈值后进入退避冷却期
symbol_error_threshold = 5

# 退避冷却基础间隔（秒）；实际间隔 = base × 2^(retry_count - 1)
symbol_cooldown_seconds = 60.0

# 退避冷却最大间隔上限（秒）
symbol_max_cooldown_seconds = 300.0

[performance]
# 每个采集周期内并发处理的最大品种数
# 过高会增加 MT5 连接压力，建议不超过 10。
max_concurrent_symbols = 5

# 队列健康监控检查间隔（秒）
# 定期输出 StorageWriter 各队列的使用率和丢弃统计。
queue_monitor_interval = 5.0

[health]
# 采集模块心跳检查间隔（秒）
health_check_interval = 30.0

# 采集延迟超过此阈值（秒）时触发告警日志
max_allowed_delay = 60.0
