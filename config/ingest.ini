# ingest.ini - 数据采集特有配置
# 共享配置从 app.ini 继承

[ingest]
# 采集特有配置
# 注意：trading.symbols, trading.timeframes, intervals.* 从 app.ini 继承

# 初始回溯时间（秒）
tick_initial_lookback_seconds = 20

# OHLC回填限制
ohlc_backfill_limit = 500

# 采集重试配置
retry_attempts = 3
retry_backoff = 1.0

# 连接超时（秒）
connection_timeout = 10.0

# Intrabar 全局采样间隔（秒）
# 0 = 自动计算：max(5, tf_seconds * 0.05)
# 可被 [ingest.intrabar_intervals] 按时间框架覆盖
intrabar_interval = 0

[ingest.intrabar_intervals]
# 按时间框架覆盖 intrabar 采样间隔（秒）。未列出的时间框架使用全局配置。
# M1 = 5.0
# M5 = 15.0
# H1 = 60.0

[performance]
# 性能调优参数
max_concurrent_symbols = 5
queue_monitor_interval = 5.0

[health]
# 健康检查配置
health_check_interval = 30.0
max_allowed_delay = 60.0
