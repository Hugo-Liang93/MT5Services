[paper_trading]
# 是否启用 Paper Trading（OBSERVE 模式下自动激活）
enabled = false

# 初始模拟资金
initial_balance = 10000.0
contract_size = 100.0

# 风险参数
risk_percent = 1.0
max_positions = 3
min_confidence = 0.55

# 交易成本模拟
commission_per_lot = 0.0
slippage_points = 3.0

# SL/TP 管理
trailing_atr_multiplier = 1.0
breakeven_atr_threshold = 1.0

# Trailing TP
trailing_tp_enabled = true
trailing_tp_activation_atr = 1.2
trailing_tp_trail_atr = 0.6

# 日终平仓
end_of_day_close_enabled = false
end_of_day_close_hour_utc = 21

# Regime SL/TP 缩放倍数
regime_tp_trending = 1.20
regime_tp_ranging = 0.80
regime_tp_breakout = 1.10
regime_tp_uncertain = 1.00
regime_sl_trending = 1.00
regime_sl_ranging = 0.90
regime_sl_breakout = 1.10
regime_sl_uncertain = 1.00

# 价格监控线程轮询间隔（秒）
price_monitor_interval = 1.0

# 持久化设置
persist_enabled = true
persist_flush_interval = 30.0

[validation]
# Paper Trading vs Backtest 验证对比容差
min_trades_for_validation = 20
win_rate_tolerance_pct = 15.0
sharpe_tolerance_pct = 50.0
max_drawdown_tolerance_pct = 50.0
