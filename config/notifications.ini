; Telegram 通知模块公共基线配置。
; 凭据 (bot_token/chat_ids) 必须写入 config/notifications.local.ini（gitignored）。
; 默认 enabled=false，未配置凭据时模块不启动。

[runtime]
; 总开关。为 false 时模块完全不构建，零运行时成本。
enabled = false
; 入站（命令接收）开关，与出站独立。出站可单向推送，入站允许 /xxx 命令查询/控制。
inbound_enabled = false
poll_interval_seconds = 1.0
getupdates_timeout_seconds = 30
worker_queue_size = 1000
max_retry_attempts = 3
; 指数退避序列（秒）；长度决定最多重试几次（含首试）。
retry_backoff_seconds = 5, 15, 45
http_timeout_seconds = 10.0
; 如需 HTTP 代理翻墙，放入 local.ini。例: http_proxy_url = http://127.0.0.1:7890

[events]
; 合法值: off / info / warning / critical
; 生产建议默认值（可在 local.ini 针对账号个性化覆盖）
;
; 已实装事件（有真实数据源）
execution_failed = critical
circuit_open = critical
queue_overflow = critical
pending_missing = critical
unmanaged_position = critical
risk_rejection = warning
health_degraded = warning
eod_block = warning
; execution_submitted 刷屏风险高（每单一推），默认关闭；
; 如需开启改 info（建议只在调试期启用）
execution_submitted = off

; 以下事件尚无真实数据源（source hook 待实装），保持 off 避免配置漂移：
;   - daily_report     待 Phase 2.5 内容生成器（scheduler 已占位）
;   - mode_changed     待 RuntimeModeController hook
;   - position_closed  待 PositionManager close hook
;   - startup_ready    待 AppRuntime.start 完成 hook
daily_report = off
mode_changed = off
position_closed = off
startup_ready = off

[event_filters]
; 仅以下 reason 触发 risk_rejection 推送（其余 reason 静默）
risk_rejection_reasons = margin_guard_block, single_trade_loss_cap, circuit_open, equity_curve_below_ma
; 指定实例抑制 INFO 级（demo 实例不推 info 降噪）
suppress_info_on_instances = demo-main, demo-exec-a

[dedup]
; 同 dedup_key 在 TTL 内抑制重复推送，避免告警风暴
critical_ttl_seconds = 300
warning_ttl_seconds = 600
info_ttl_seconds = 1800

[rate_limit]
; Telegram Bot API 全局限速 30 条/秒 30 条/分；这里取保守值
global_per_minute = 30
per_chat_per_minute = 10
; 入站命令限流（每 chat_id）
inbound_per_chat_per_minute = 10

[schedules]
; 每天 UTC HH:MM 触发日终报告；留空禁用
daily_report_utc = 21:00

[templates]
directory = config/notifications/templates
strict_validation = true

[inbound]
enabled = false
command_whitelist = health, positions, signals, executor, pending, mode, trace, daily-report, halt, resume, reload-config
; allowed_chat_ids / admin_chat_ids 在 local.ini 中配置

[chats]
; default_chat_id 在 local.ini 中配置
default_chat_id =
