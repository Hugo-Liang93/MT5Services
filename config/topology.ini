# topology.ini — 实例编排事实源
#
# 规则：
#   - group 名本身就是当前运行环境（live / demo）
#   - 每个 group 定义一个 main 和零到多个 workers
#   - 实例角色由 group 归属自动推导，不再写在 app.ini
#   - live_topology_mode 由 group 是否存在 workers 自动推导：
#       workers 为空   -> single_account
#       workers 非空   -> multi_account

[group.live]
main = live-main
workers = live-exec-a
; workers = live-exec-a,live-exec-b

[group.demo]
main = demo-main
workers =
