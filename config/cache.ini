# cache.ini — 运行时内存缓存大小配置
#
# 此文件的值会覆盖 app.ini [limits] 中对应的缓存限制。
# 优先级：cache.ini > app.ini [limits] > 代码默认值
#
# 使用场景：在不修改共享 app.ini 的前提下，针对本机环境调整内存用量。
# 仅包含与内存缓冲区大小相关的参数，其他配置请在 app.ini 中修改。

[cache]
# 每个品种保留的最大 Tick 条数（覆盖 app.ini limits.tick_cache_size）
tick_cache_size = 5000

# 每个品种/时间框架保留的最大 OHLC K 线条数（覆盖 app.ini limits.ohlc_cache_limit）
ohlc_cache_limit = 500

# 每个品种/时间框架保留的最大 Intrabar 数据点数
# 仅影响内存中用于实时指标计算的未收盘 K 线历史深度。
intrabar_max_points = 500

# OHLC 收盘事件队列大小（条）
# 此队列用于在 IndicatorManager 内部传递 K 线收盘事件，
# 触发指标计算和信号评估。增大可缓解高频收盘事件积压。
ohlc_event_queue_size = 1000
