# mt5.ini — MT5 账户连接基线配置
#
# 正式模型：
#   - 根目录 config/mt5.ini 只放共享默认值
#   - 每个实例自己的账户配置放在 config/instances/<instance>/mt5.ini
#   - 敏感值与本机路径放到对应实例目录下的 mt5.local.ini
#
# 不再支持：
#   - default_account
#   - [account.xxx] 多账户字典
#   - 根 mt5.local.ini 为多实例统一注入账户凭据

[mt5]
# 账户别名默认值。多实例部署下建议在实例 mt5.ini 中显式声明。
account_alias = default

# 账户展示名默认值。
label = Default Account

# 共享默认值：实例级未配置时可继承
timezone = UTC
server_time_offset_hours =

# 单实例直连模式可直接在根 mt5.local.ini 或当前文件填写以下项；
# 多实例部署下请放到 config/instances/<instance>/mt5.local.ini。
login =
password =
server =
path =
