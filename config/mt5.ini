# mt5.ini — MetaTrader 5 终端连接配置
#
# 一个服务实例在整个生命周期内只绑定一个 MT5 账户。
# 通过 default_account 选择启动时激活的账户配置段。
# 账户凭据（login / password）建议写入 config/mt5.local.ini（已被 .gitignore 忽略）。
# ⚠️ MT5 Python 绑定仅支持 Windows，Linux/macOS 下需 Mock。

[mt5]
# 启动时激活的账户配置段名称
# 取值为下方 [account.<name>] 中的 <name>，或 "default" 表示使用本节的直接配置。
default_account = default

# 以下为 default_account = default 时直接使用的账户参数
# （当 default_account 指向某个 [account.*] 时，这些值作为缺省回退）

# MT5 账户登录号
login =
# MT5 账户密码
password =
# MT5 经纪商服务器名称（如 MetaQuotes-Demo）
server =
# MT5 终端可执行文件路径（Windows 路径，如 C:\Program Files\MetaTrader 5\terminal64.exe）
path =
# 账户所在时区（影响 K 线时间戳解析）
timezone = UTC

[account.demo]
# 额外账户配置段，用于多实例部署或快速切换演示账户。
# 将 [mt5] default_account = demo 即可激活此段。
# ⚠️ 账户在运行时不可通过 API 切换，需重启服务。

# 是否启用此账户配置段
enabled = false

# 账户描述标签（仅用于日志和监控展示）
label = Demo

login =
password =
server =
path =
timezone = UTC
