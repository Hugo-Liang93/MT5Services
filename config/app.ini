# app.ini - 主配置文件，定义核心共享参数
# 所有模块共享的配置集中在此，实现单一信号源

[trading]
# 交易品种配置 - 单一信号源
symbols = XAUUSD
# 支持多品种（逗号分隔）: XAUUSD,EURUSD,USDJPY,GBPUSD

# 时间框架配置
timeframes = M1,H1
# 支持的时间框架: M1,M5,M15,M30,H1,H4,D1,W1,MN1

# 默认品种（API使用）
default_symbol = XAUUSD

[intervals]
# 数据采集间隔（秒）
tick_interval = 0.5
ohlc_interval = 30.0

# API流式数据间隔
stream_interval = 1.0

# 指标重载间隔
indicator_reload_interval = 60

[limits]
# API返回数据限制
tick_limit = 200
ohlc_limit = 200

# 缓存大小限制
tick_cache_size = 5000
ohlc_cache_limit = 500

# 数据新鲜度阈值（秒）
quote_stale_seconds = 1.0

[system]
# 时区配置
timezone = UTC

# 日志级别
log_level = INFO

# 启用模块
modules_enabled = ingest,api,indicators,storage