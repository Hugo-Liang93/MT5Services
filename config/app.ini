# app.ini — 核心共享配置（单一信号源）
#
# 此文件是全局共享参数的唯一定义点。
# 所有其他模块（market.ini、ingest.ini 等）从此处继承品种、时间框架和缓存限制。
# 修改此文件后执行: python validate_config.py

[trading]
# 交易品种列表（逗号分隔）
# 所有模块（采集、指标、信号）均以此为准，不允许在其他配置文件中重复定义。
# 示例（多品种）: XAUUSD,EURUSD,USDJPY,GBPUSD
symbols = XAUUSD

# 时间框架列表（逗号分隔）
# 可选值: M1,M5,M15,M30,H1,H4,D1,W1,MN1
# 同时影响 OHLC 采集、指标计算和信号评估的粒度。
# intrabar trigger 当前依赖 M1 作为 M5/M15/M30 的 child TF，因此 M1 必须纳入共享时间框架集合。
timeframes = M1,M5,M15,M30,H1,H4,D1

# API 默认品种（当请求未指定品种时使用）
default_symbol = XAUUSD

[intervals]
# 主轮询循环间隔（秒）
# BackgroundIngestor 每轮依次采集 quote/tick/ohlc/intrabar，此值控制轮次间 sleep 时长。
# 值越小实时性越高，但会增加 MT5 连接压力。
poll_interval = 0.5

# OHLC 历史 K 线采集间隔（秒）
# 用于检测新 bar 收盘事件，触发指标计算与信号评估。
# 作为未显式覆盖 TF 的默认间隔；具体 TF 覆盖见下方 [ohlc_intervals]。
ohlc_interval = 30.0

# SSE 流式推送间隔（秒）
# /stream 端点向客户端推送实时报价的频率。
stream_interval = 1.0

# indicators.json 热重载间隔（秒）
# 设为 0 表示禁用热重载，需重启服务生效。
indicator_reload_interval = 60

[ohlc_intervals]
# 每个时间框架的新收盘 K 线检测间隔（秒）。
# 低 TF 直接影响日内较高频策略的确认信号延迟；高 TF 放宽以避免过度轮询。
M1 = 2.0
M5 = 5.0
M15 = 10.0
M30 = 15.0
H1 = 30.0
H4 = 60.0
D1 = 300.0

[limits]
# API 单次请求最多返回的 Tick 条数
tick_limit = 200

# API 单次请求最多返回的 OHLC K 线条数
ohlc_limit = 200

# 内存中每个品种保留的最大 Tick 条数（滚动缓冲区）
# 同时作为 ingest 初始回溯的拉取上限。
tick_cache_size = 5000

# 内存中每个品种/时间框架保留的最大 OHLC 条数
# 影响指标计算可用的历史深度（需 >= 最长周期指标的 min_bars）。
ohlc_cache_limit = 500

# 报价被判定为"过期"的时间阈值（秒）
# 超过此值则 API 返回 stale 标志，不参与交易决策。
quote_stale_seconds = 1.0

[tick_features]
# Tick-derived 特征窗口（秒）。高频/恢复类策略从此窗口提取微观特征。
window_seconds = 5.0

# Tick-feature 快照发布间隔（秒）。不要与 OHLC 收盘轮询混用。
emit_interval_seconds = 1.0

# 最新 quote 距快照生成时间超过该值时，tick-feature 标记 stale。
max_quote_age_ms = 1500

# 默认点差上限（以 point_size 计点）；品种覆盖见 [tick_feature_max_spread_points]。
max_spread_points = 30.0

# 一个窗口内少于该 tick/quote 数量时，tick-feature 标记 sparse。
min_ticks_per_window = 3

# 默认最小点值，适用于大多数 5 位外汇品种；品种覆盖见 [tick_feature_point_size]。
point_size = 0.00001

# tick-feature 健康快照超过该秒数未更新时，交易准入视为 stale。
max_snapshot_age_seconds = 3.0

# tick-feature 事件总线最大缓冲长度。
bus_maxlen = 4096

[tick_feature_point_size]
# 黄金按 0.01 计点；否则会把正常黄金点差误判为超宽点差。
XAUUSD = 0.01

[tick_feature_max_spread_points]
# XAUUSD tick-derived/recovery 探针的点差门槛，与信号层黄金点差口径保持同量级。
XAUUSD = 80.0

[system]
# 全局时区（用于日志时间戳、经济日历事件对齐）
# 支持 pytz 时区字符串，如 UTC、Asia/Shanghai、America/New_York
timezone = Asia/Shanghai

# 日志输出级别（DEBUG / INFO / WARNING / ERROR）
log_level = INFO

# ── 日志文件持久化 ──
# 启用后日志同时写入文件（控制台输出不受影响）
log_file_enabled = true
# 日志文件目录基线（相对于项目根目录）。
# 命名实例启动时会自动隔离到 data/logs/<instance>/。
log_dir = data/logs
# 单文件上限（MB），达到后自动轮转
log_file_max_mb = 100
# 保留的历史文件数（总上限 ≈ max_mb × (backup_count + 1)）
log_file_backup_count = 10
# WARNING 及以上级别独立写入的快速排障文件（留空 = 不启用）
log_error_file = errors.log

# API 服务监听地址（备用值）
# 仅在 market.ini 缺失时生效；正常情况下由 market.ini [api] host 覆盖。
api_host = 0.0.0.0
# 运行期 SQLite / WAL / 健康监控等本地状态目录基线。
# 命名实例启动时会自动隔离到 data/runtime/<instance>/。
runtime_data_dir = data/runtime

# 实例角色 / single-multi account 拓扑不再在此定义；
# 统一由 config/topology.ini 推导。

[trading_ops]
# 运行模式：
# full = 正常运行（指标/信号/自动交易/仓位管理全开）
# observe = 保留指标与信号，但不监听执行
# risk_off = 仅保留行情采集与仓位/挂单管理
# ingest_only = 仅保留行情采集（要求无持仓、无挂单）
runtime_mode = full

# EOD 后自动降级目标：
# disabled = 不自动切换
# risk_off = 停指标/信号，仅保留风险管理
# ingest_only = 在空仓空单时进一步降到仅采集
runtime_mode_after_eod = ingest_only

# 人工/API 收口成功后的运行模式目标：
# disabled = 只收口，不切模式
# risk_off = 收口后进入风险关闭模式
# ingest_only = 收口完成且空仓空单后切到仅采集
runtime_mode_after_manual_closeout = ingest_only
runtime_mode_auto_check_interval_seconds = 15

# 启动恢复时发现 MT5 有挂单、但本地没有状态记录时的处置：
# record_only = 仅记录为 orphan，保留挂单；cancel = 记录后主动撤单
pending_recovery_orphan_action = record_only

# 启动恢复时发现本地挂单已不在 MT5、且未识别出对应持仓时的处置：
# mark_missing = 记录为 missing；ignore = 不更新生命周期状态
pending_recovery_missing_action = mark_missing
