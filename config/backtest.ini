[backtest]
# 默认初始资金
default_initial_balance = 10000.0
# 指标热身 bar 数量（覆盖最长周期指标 ema55 + 余量）
default_warmup_bars = 200
# 最大同时持仓数
max_positions_per_symbol = 3
# 手续费（每手，0 = 无手续费）
commission_per_lot = 0.0
# 滑点模拟（点数，0 = 无滑点）
slippage_points = 0.0
# 最低开仓置信度
min_confidence = 0.55
# 默认合约大小（XAUUSD = 100 oz/lot）
contract_size = 100.0
# 默认风险百分比
risk_percent = 1.0

# ═══════════════════════════════════════════════════════════════════════════════
# [position] — 持仓管理配置（复用实盘 position_rules 纯逻辑）
# ═══════════════════════════════════════════════════════════════════════════════
[position]
# trailing stop ATR 倍数（与实盘 PositionManager 相同参数）
trailing_atr_multiplier = 1.0
# breakeven 触发 ATR 阈值
breakeven_atr_threshold = 1.0
# 日终自动平仓
end_of_day_close_enabled = false
end_of_day_close_hour_utc = 21
end_of_day_close_minute_utc = 0

# ═══════════════════════════════════════════════════════════════════════════════
# [pending_entry] — 价格确认入场配置
# ═══════════════════════════════════════════════════════════════════════════════
[pending_entry]
# 是否启用价格确认入场（false = 直接按收盘价入场）
enabled = false
# 超时 bar 数（默认 2 根 bar 后取消）
expiry_bars = 2
# ATR 区间因子
pullback_atr_factor = 0.3
chase_atr_factor = 0.1
momentum_atr_factor = 0.5
symmetric_atr_factor = 0.4

# ═══════════════════════════════════════════════════════════════════════════════
# [confidence] — 置信度管线开关
# ═══════════════════════════════════════════════════════════════════════════════
[confidence]
# Regime 亲和度修正
enable_regime_affinity = true
# 日内绩效追踪乘数
enable_performance_tracker = true
# 长期历史校准
enable_calibrator = true
# HTF 方向对齐修正
enable_htf_alignment = true

[optimizer]
# 默认搜索模式：grid | random
default_search_mode = grid
# random 模式最大采样数
max_combinations = 500
# 默认排序指标
sort_metric = sharpe_ratio

[report]
# 资金曲线采样间隔（每 N 根 bar 采样一个点）
equity_curve_sample_interval = 100

# ═══════════════════════════════════════════════════════════════════════════════
# [filters] — 回测过滤器模拟配置
#
# 模拟实盘 SignalFilterChain 行为，确保回测结果更贴近真实交易环境。
# 过滤器使用 bar.time 替代 datetime.now() 进行历史时间判断。
# ═══════════════════════════════════════════════════════════════════════════════
[filters]
# 总开关：是否启用过滤器模拟
enabled = true

# ── 时段过滤 ──────────────────────────────────────────────────────────
# 允许交易的时段（对应 signal.ini [signal].allowed_sessions）
session_filter_enabled = true
allowed_sessions = london,newyork

# ── 时段切换冷却 ──────────────────────────────────────────────────────
# London → New York 切换窗口冷却（对应 signal.ini [signal].session_transition_cooldown_minutes）
session_transition_enabled = true
session_transition_cooldown_minutes = 15

# ── 波动率异常抑制 ────────────────────────────────────────────────────
# ATR spike 倍数（对应 signal.ini [signal].volatility_atr_spike_multiplier）
# 当前 ATR > baseline ATR × 此值时跳过策略评估
# 0 = 禁用
volatility_filter_enabled = true
volatility_spike_multiplier = 2.5

# ── 点差过滤 ──────────────────────────────────────────────────────────
# 回测中默认禁用（历史 spread 数据通常不可用）
# 启用后使用模拟点差值（按时段）
spread_filter_enabled = false
max_spread_points = 50.0

# ── 模拟点差值（按时段）──────────────────────────────────────────────
# 仅在 spread_filter_enabled = true 时生效
# 无真实 spread 数据时，按时段使用以下固定值
[filters.simulated_spread]
asia = 30.0
london = 25.0
newyork = 20.0
off_hours = 45.0

# ═══════════════════════════════════════════════════════════════════════════════
# [persistence] — 回测数据持久化配置
# ═══════════════════════════════════════════════════════════════════════════════
[persistence]
# 是否将回测结果持久化到 TimescaleDB
# 持久化内容：backtest_runs + backtest_trades + backtest_signal_evaluations
enabled = true
# 信号评估记录的最大数量（避免大规模回测时内存/DB 暴涨）
# 0 = 不限制
max_signal_evaluations = 50000
