# risk.ini — demo-main 可选账户级风控覆盖
#
# 非敏感、可提交版本库的账户差异可写在这里；
# 敏感或本机差异请写到同目录 risk.local.ini。

[risk]
# M1/M5 高频 demo_validation profile。频率靠 alpha 与风控共同约束，
# 不通过放宽 spread / daily loss / margin guard 制造交易数。
allowed_sessions = london,new_york
max_positions_per_symbol = 3
max_volume_per_order = 0.01
max_volume_per_symbol = 0.03
daily_loss_limit_pct = 5
margin_safety_factor = 1.2
max_trades_per_day = 20
max_trades_per_hour = 4

[margin_guard]
enabled = true
warn_level = 300
danger_level = 200
critical_level = 150
