# exit.ini — live-main 账户级出场参数覆盖
#
# 非敏感、可提交版本库的账户差异写在这里；
# 敏感或本机差异请写到同目录 exit.local.ini。
#
# 覆盖语义：此文件中填写的 section/key 会覆盖全局 config/exit.ini；
# 未填写的 key 继承全局值。
#
# 常用调优场景（取消注释并修改即可）：
#
# [chandelier]
# # 缩短超时退出窗口（如 live-main 偏保守）
# timeout_bars = 0
# # 调整硬上界 TP
# max_tp_r = 5.0
#
# [exit_profile]
# # 让本实例整体走更保守的 trail（aggression 值更小）
# trend__trending = 0.70
# trend__ranging = 0.10
#
# [exit_profile.tf_scale]
# # 该实例重点 TF 的 trail 缩放
# H1 = 0.90
