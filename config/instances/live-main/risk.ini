# risk.ini — live-main 可选账户级风控覆盖
#
# 非敏感、可提交版本库的账户差异可写在这里；
# 敏感或本机差异请写到同目录 risk.local.ini。

[risk]
# M1/M5 active_guarded 小资金 profile；只有策略通过 demo gate 后才应进入 live。
allowed_sessions = london,new_york
max_positions_per_symbol = 2
max_volume_per_order = 0.01
max_volume_per_symbol = 0.02
daily_loss_limit_pct = 2
margin_safety_factor = 1.2
max_trades_per_day = 8
max_trades_per_hour = 2

[margin_guard]
enabled = true
warn_level = 350
danger_level = 250
critical_level = 180
