# exit.ini — live-exec-a 账户级出场参数覆盖
#
# 非敏感、可提交版本库的账户差异写在这里；
# 敏感或本机差异请写到同目录 exit.local.ini。
#
# 覆盖语义：此文件中填写的 section/key 会覆盖全局 config/exit.ini；
# 未填写的 key 继承全局值。
#
# 常用调优场景（取消注释并修改即可）：
#
# [chandelier]
# # 本 worker 走更激进 trail
# default_alpha = 0.70
#
# [exit_profile]
# # trend 策略在 trending regime 更激进放 trail
# trend__trending = 0.90
