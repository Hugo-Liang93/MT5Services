# db.ini — TimescaleDB（PostgreSQL）连接配置
#
# 服务启动时自动初始化 schema 和 hypertable（若不存在）。
# 需要预先在 PostgreSQL 中安装 TimescaleDB 扩展。
# 生产环境凭据建议写入 config/db.local.ini（已被 .gitignore 忽略）。

[db]
# 数据库主机地址
host = localhost

# 数据库端口（PostgreSQL 默认 5432）
port = 5432

# 数据库用户名
user =

# 数据库密码
password =

# 数据库名称
database =

# Schema 名称（通常为 public）
schema = public

# ── 数据保留策略 ──────────────────────────────────────────────
# 启用/禁用自动 retention + compression policy
# 首次启用后 TimescaleDB 后台 worker 会自动清理过期数据和压缩旧 chunk
[retention]
enabled = true

# 各表保留天数（覆盖代码默认值）
# 格式：table_name = 天数
# 取消注释即可覆盖：
# ticks = 90
# quotes = 90
# ohlc = 365
# ohlc_intrabar = 30
# signal_events = 180
# signal_preview_events = 7
# signal_outcomes = 180
# auto_executions = 180
# trade_outcomes = 730
# trade_command_audits = 730
# pipeline_trace_events = 30
# circuit_breaker_history = 365
# position_sl_tp_history = 365
# economic_calendar_events = 365
# economic_calendar_event_updates = 90
# economic_event_market_impact = 180
