# economic.ini — 经济日历服务配置
#
# 控制经济事件的拉取、缓存、过滤和交易保护（Trade Guard）行为。
# API Key 建议写入 config/economic.local.ini（已被 .gitignore 忽略）。

[economic]
# 是否启用经济日历服务
enabled = true

# 初始拉取的历史日历事件回溯天数
lookback_days = 7

# 初始拉取的未来日历事件展望天数
lookahead_days = 14

# 向外部 API（FRED / TradingEconomics）发起请求的超时时间（秒）
request_timeout_seconds = 10.0

# 经济日历事件显示所用本地时区
local_timezone = Asia/Shanghai

# 增量刷新间隔（秒）：仅拉取近期窗口内的事件更新
refresh_interval_seconds = 900

# 全量同步间隔（秒）：重新拉取完整的回溯 + 展望范围
# 6 小时（21600 秒）为推荐值，避免频繁消耗 API 配额。
calendar_sync_interval_seconds = 21600

# 近期事件（near_term_window_hours 以内）的专项刷新间隔（秒）
near_term_refresh_interval_seconds = 900

# 已发布事件的轮询间隔（秒）：监测 pending_release → released 状态变化
release_watch_interval_seconds = 60

# 服务启动后延迟开始全量同步的等待时间（秒）
# 避免启动时多服务同时触发 API 请求。
startup_calendar_sync_delay_seconds = 180

# 定时刷新任务的随机抖动范围（秒），防止多实例同时触发请求
refresh_jitter_seconds = 5

# 服务启动时是否立即执行一次增量刷新
startup_refresh = true

# 请求失败时的最大重试次数
request_retries = 3

# 重试退避时间（秒）；第 n 次重试等待 retry_backoff_seconds * n 秒
retry_backoff_seconds = 1.0

# 缓存事件被判定为"过期"的时间阈值（秒）
# 超过此值且未完成刷新则触发告警。
stale_after_seconds = 1800

# 高重要性事件的最低 importance 阈值（1~3，3 为最高）
# 用于 Trade Guard 过滤和近期事件告警。
high_importance_threshold = 3

# 高重要性事件发布前的交易保护缓冲时间（分钟）
pre_event_buffer_minutes = 30

# 高重要性事件发布后的交易保护缓冲时间（分钟）
post_event_buffer_minutes = 30

# "近期事件"窗口（小时）：此窗口内的事件触发更高频刷新
near_term_window_hours = 72

# Release Watch 回溯窗口（分钟）：监测此时间段内已发布但尚未更新的事件
release_watch_lookback_minutes = 15

# Release Watch 展望窗口（分钟）：监测此时间段内即将发布的事件
release_watch_lookahead_minutes = 120

# 默认拉取的国家/地区列表（逗号分隔）
# 影响 FRED 和 TradingEconomics 数据过滤范围。
default_countries = United States,Euro Area,United Kingdom,Japan,Canada,Australia,China,New Zealand,Switzerland

# FRED 发布 ID 白名单（精确匹配，逗号分隔，为空表示不限制）
fred_release_whitelist_ids =

# FRED 发布名称关键词白名单（模糊匹配，逗号分隔）
# 只有名称包含以下关键词的发布才会被纳入日历。
fred_release_whitelist_keywords = fomc,consumer price,producer price,employment situation,gross domestic product,retail sales,industrial production,personal income,personal consumption expenditures,jobless claims,unemployment,housing starts,new residential construction

# FRED 发布名称关键词黑名单（模糊匹配，逗号分隔）
# 名称包含以下关键词的发布将被过滤掉。
fred_release_blacklist_keywords = coinbase,crypto,dow jones,market statistics,commercial paper,daily treasury

# 使用 curated（精选）模式的数据来源（逗号分隔）
# 目前支持 tradingeconomics。
curated_sources = tradingeconomics

# Curated 模式过滤的国家/地区列表
curated_countries = United States,Euro Area,United Kingdom,Japan,China,Canada,Australia,Switzerland,New Zealand

# Curated 模式过滤的货币列表（为空表示不限制货币）
curated_currencies =

# Curated 模式允许的事件状态列表
# 可选值: scheduled, imminent, pending_release, released
curated_statuses = scheduled,imminent,pending_release,released

# Curated 模式最低 importance 阈值（低于此值的事件被过滤）
curated_importance_min = 2

# Curated 模式是否包含全天事件（如节假日）
curated_include_all_day = false

# ── Trade Guard 交易保护 ────────────────────────────────────────────
# Trade Guard 在重要经济事件发布前后阻止或告警新开仓操作。

# 是否启用 Trade Guard
trade_guard_enabled = true

# Trade Guard 触发模式
#   warn_only  仅记录警告日志，不阻断下单
#   block      直接拒绝下单请求并返回错误
trade_guard_mode = block

# 日历数据健康检查模式（日历拉取失败时的行为）
#   warn_only  仅告警，允许交易继续
#   block      日历不可用时阻止所有新开仓
trade_guard_calendar_health_mode = warn_only

# Trade Guard 展望窗口（分钟）：事件发布前多少分钟开始保护
trade_guard_lookahead_minutes = 180

# Trade Guard 回溯窗口（分钟）：事件发布后多少分钟内继续保护（0 = 立即解除）
trade_guard_lookback_minutes = 0

# Trade Guard 最低 importance 阈值（为空表示使用 high_importance_threshold）
trade_guard_importance_min =

# 连续请求失败多少次后触发 calendar_health_mode 保护
trade_guard_provider_failure_threshold = 3

[fred]
# 是否启用 FRED（美联储经济数据库）数据源
enabled = true

# FRED API Key（申请地址：https://fred.stlouisfed.org/docs/api/api_key.html）
# 建议写入 config/economic.local.ini
api_key =

[tradingeconomics]
# 是否启用 TradingEconomics 数据源
enabled = true

# TradingEconomics API Key
# 建议写入 config/economic.local.ini
api_key =

[fmp]
# 是否启用 FMP (Financial Modeling Prep) 数据源
# 提供全球经济日历，含 actual/forecast/previous + impact 分级
# 免费层 250 请求/天，Starter $14/月
enabled = false

# FMP API Key（申请地址：https://site.financialmodelingprep.com/developer/docs）
# 建议写入 config/economic.local.ini
api_key =

[alphavantage]
# 是否启用 Alpha Vantage 经济指标数据源
# 提供核心美国经济指标历史数值序列（GDP、CPI、NFP 等）
# 免费层 25 请求/天，Premium $49.99/月
enabled = true

# Alpha Vantage API Key（申请地址：https://www.alphavantage.co/support/#api-key）
# 建议写入 config/economic.local.ini
api_key =

# 需要追踪的经济指标列表（逗号分隔）
# 支持: REAL_GDP, CPI, INFLATION, RETAIL_SALES, FEDERAL_FUNDS_RATE,
# NONFARM_PAYROLL, UNEMPLOYMENT, TREASURY_YIELD, CONSUMER_SENTIMENT
tracked_indicators = CPI,NONFARM_PAYROLL,FEDERAL_FUNDS_RATE,UNEMPLOYMENT,REAL_GDP,RETAIL_SALES

# ── Market Impact 行情影响统计 ────────────────────────────────────────────
# 统计重要经济数据发布前后的市场价格变化、波动率跳变。
# 数据用于策略权重调整和 Trade Guard 动态保护窗口。

[market_impact]
# 是否启用行情影响统计
enabled = true

# 统计的品种（逗号分隔）
symbols = XAUUSD

# 统计的时间框架（M1 精度最高）
timeframes = M1,M5

# 仅统计 importance >= 此阈值的事件
importance_min = 2

# 发布前回溯窗口（分钟，逗号分隔）
pre_windows = 30,60,120

# 发布后观察窗口（分钟，逗号分隔）
post_windows = 5,15,30,60,120

# 最终收集延迟（分钟）— 最大 post 窗口结束后开始最终收集
final_collection_delay_minutes = 130

# 历史回填：启动时回填过去 N 天内已 released 但未统计的事件
backfill_enabled = true
backfill_days = 7

# 聚合统计刷新间隔（秒，0=不自动刷新）
stats_refresh_interval_seconds = 21600

# Trade Guard 动态保护窗口阈值
# 高波动事件（spike > high_spike_threshold）扩大到 high_spike_buffer_minutes
high_spike_threshold = 3.0
high_spike_buffer_minutes = 60
# 中高波动事件（spike > med_spike_threshold）扩大到 med_spike_buffer_minutes
med_spike_threshold = 2.0
med_spike_buffer_minutes = 45
