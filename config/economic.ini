# economic.ini — 经济日历服务配置
#
# 控制经济事件的拉取、缓存、过滤和交易保护（Trade Guard）行为。
# API Key 建议写入 config/economic.local.ini（已被 .gitignore 忽略）。

[economic]
# 是否启用经济日历服务
enabled = true

# 初始拉取的历史日历事件回溯天数
lookback_days = 7

# 初始拉取的未来日历事件展望天数
lookahead_days = 14

# 向外部 API（FRED / TradingEconomics）发起请求的超时时间（秒）
request_timeout_seconds = 10.0

# 经济日历事件显示所用本地时区
local_timezone = Asia/Shanghai

# 增量刷新间隔（秒）：仅拉取近期窗口内的事件更新
refresh_interval_seconds = 900

# ── 采集频率设计（Per-Job Provider 路由）──────────────────────────────
#
# 通过 *_sources 参数为每种任务指定使用哪些 provider，解耦频率与配额：
#   - Jin10（无配额）作为高频主力
#   - FRED/AV/TE 作为低频补充，仅参与 calendar_sync
#
# 频率预算：
#   calendar_sync  (21600s/6h) → Jin10 + FRED + AV: 4次/天
#     TE 已禁用；AV 4次×6指标 = 24次/天 ≤ 25/天 ✅
#   near_term_sync (900s/15m)  → 仅 Jin10: 96次/天（无配额限制）
#   release_watch  (120s/2m)   → 仅 Jin10: 720次/天（无配额限制）

# 全量同步间隔（秒）：重新拉取完整的回溯 + 展望范围
calendar_sync_interval_seconds = 21600

# 全量同步使用的数据源（逗号分隔，为空 = 全部已配置 provider）
calendar_sync_sources = jin10

# 近期事件专项刷新间隔（秒）
# 设为 0 禁用：日历结构由 calendar_sync 负责，公布值由 release_watch 动态追踪
near_term_refresh_interval_seconds = 0

# 近期同步使用的数据源（禁用时无效）
near_term_sync_sources = jin10

# 已发布事件轮询间隔（秒）：监测 pending_release → released 状态变化
# 仅用 Jin10（支持 release_watch 且无配额），2 分钟轮询捕获公布值
release_watch_interval_seconds = 120

# release_watch 使用的数据源
release_watch_sources = jin10

# 服务启动后延迟开始全量同步的等待时间（秒）
startup_calendar_sync_delay_seconds = 180

# 定时刷新任务的随机抖动范围（秒），防止多实例同时触发请求
refresh_jitter_seconds = 5

# 服务启动时是否立即执行一次增量刷新
startup_refresh = true

# 请求失败时的最大重试次数
request_retries = 3

# 重试退避时间（秒）；第 n 次重试等待 retry_backoff_seconds * n 秒
retry_backoff_seconds = 1.0

# 缓存事件被判定为"过期"的时间阈值（秒）
# 超过此值且未完成刷新则触发告警。
stale_after_seconds = 1800

# 高重要性事件的最低 importance 阈值（1~3，3 为最高）
# 用于 signal-domain 经济过滤 / confidence decay，以及账户侧 Trade Guard。
high_importance_threshold = 3

# 高重要性事件发布前的交易保护缓冲时间（分钟）
# 同时作为 signal filter 的前置硬阻断窗口。
pre_event_buffer_minutes = 30

# 高重要性事件发布后的交易保护缓冲时间（分钟）
# 同时作为 signal filter 的后置硬阻断窗口。
post_event_buffer_minutes = 30

# "近期事件"窗口（小时）：此窗口内的事件触发更高频刷新
near_term_window_hours = 72

# Release Watch 回溯窗口（分钟）：监测此时间段内已发布但尚未更新的事件
release_watch_lookback_minutes = 15

# Release Watch 展望窗口（分钟）：监测此时间段内即将发布的事件
release_watch_lookahead_minutes = 120

# 默认拉取的国家/地区列表（逗号分隔）
# 影响 FRED 和 TradingEconomics 数据过滤范围。
default_countries = United States,Euro Area,United Kingdom,Japan,Canada,Australia,China,New Zealand,Switzerland

# FRED 发布 ID 白名单（精确匹配，逗号分隔，为空表示不限制）
fred_release_whitelist_ids =

# FRED 发布名称关键词白名单（模糊匹配，逗号分隔）
# 只有名称包含以下关键词的发布才会被纳入日历。
fred_release_whitelist_keywords = fomc,consumer price,producer price,employment situation,gross domestic product,retail sales,industrial production,personal income,personal consumption expenditures,jobless claims,unemployment,housing starts,new residential construction

# FRED 发布名称关键词黑名单（模糊匹配，逗号分隔）
# 名称包含以下关键词的发布将被过滤掉。
fred_release_blacklist_keywords = coinbase,crypto,dow jones,market statistics,commercial paper,daily treasury

# 使用 curated（精选）模式的数据来源（逗号分隔）
curated_sources = jin10

# Curated 模式过滤的国家/地区列表
curated_countries = United States,Euro Area,United Kingdom,Japan,China,Canada,Australia,Switzerland,New Zealand

# Curated 模式过滤的货币列表（为空表示不限制货币）
curated_currencies =

# Curated 模式允许的事件状态列表
# 可选值: scheduled, imminent, pending_release, released
curated_statuses = scheduled,imminent,pending_release,released

# Curated 模式最低 importance 阈值（低于此值的事件被过滤）
curated_importance_min = 2

# Curated 模式是否包含全天事件（如节假日）
curated_include_all_day = false

# ── Trade Guard 交易保护（分级压制）─────────────────────────────────
# Trade Guard 在经济事件发布前后根据事件重要性分级处理：
#   - 高星级（importance >= block_importance_min）→ block 阻断交易
#   - 低星级（importance < block_importance_min）→ warn 仅警告，不阻断
#
# 示例（金十星级 → importance 映射）：
#   ★★★★★ NFP/FOMC = importance 3 → block（事件前30min~后30min）
#   ★★★   EIA原油   = importance 2 → warn（事件前15min~后10min）
#   ★★    二级数据   = importance 1 → 不触发 Trade Guard

# 是否启用 Trade Guard
trade_guard_enabled = true

# Trade Guard 全局模式（block_importance_min 以上的事件触发此模式）
trade_guard_mode = block

# 日历数据健康检查模式
trade_guard_calendar_health_mode = warn_only

# Trade Guard 高星级事件保护窗口（完全阻断交易）
trade_guard_lookahead_minutes = 180
trade_guard_lookback_minutes = 0

# 触发 Trade Guard 的最低 importance（含 warn 级别）
# 低于此值的事件完全不进入 Trade Guard 判定
trade_guard_importance_min = 2

# 触发 block（完全阻断）的最低 importance
# importance >= 此值 → block（使用 pre/post_event_buffer_minutes 窗口）
# importance < 此值但 >= trade_guard_importance_min → warn（使用更窄的 warn 窗口）
trade_guard_block_importance_min = 3

# ── 品种相关性过滤 ──
# 仅对当前交易品种有直接影响的事件才触发 block/warn。
# 未匹配的事件降级处理：importance 自动降 1 级（3→2 变 warn，2→1 不触发）。
# 启用后可大幅减少 XAUUSD 被无关 USD 事件（如 ADP 就业、消费者信心）误阻断的情况。
trade_guard_relevance_filter_enabled = true

# XAUUSD 高影响事件关键词（事件名包含任一关键词 → 视为与黄金直接相关）
# 这些事件保持原始 importance 不降级。
# 未匹配的事件 importance 自动 -1（如 ADP importance=2 → 降为 1 → 不触发 Trade Guard）
gold_impact_keywords = NFP,Non-Farm,Nonfarm,FOMC,Fed,Interest Rate,CPI,Inflation,PPI,GDP,Unemployment,Retail Sales,PMI,ISM,Core PCE,Treasury,Durable Goods,Trade Balance,Consumer Price,Producer Price,Federal Reserve,Powell,Jackson Hole,Payrolls

# warn 级别事件的保护窗口（比 block 窄，仅记录警告不阻断）
trade_guard_warn_pre_buffer_minutes = 15
trade_guard_warn_post_buffer_minutes = 10

# 连续请求失败多少次后触发 calendar_health_mode 保护
trade_guard_provider_failure_threshold = 3

# ── 三档自适应 release_watch ──────────────────────────────────────
# release_watch 根据最近事件的距离动态调整轮询频率：
#   空闲档（> approaching_minutes）  → 每 30min 轮询
#   预热档（approaching ~ active）   → 每 10min 轮询
#   活跃档（< active_minutes 或刚发布）→ 每 2min 轮询

# 空闲档间隔（秒）：无即将发布事件时
release_watch_idle_interval_seconds = 1800
# 预热档间隔（秒）：事件临近时
release_watch_approaching_interval_seconds = 600
# 活跃档间隔（秒）：事件即将/刚刚发布时
release_watch_active_interval_seconds = 120

# 进入预热档的提前时间（分钟）
# signal confidence decay 的预热窗口也从这里派生，不再在 signal runtime 内部维护隐藏常量。
release_watch_approaching_minutes = 120
# 进入活跃档的提前时间（分钟）
release_watch_active_minutes = 30
# 活跃档在事件发布后持续时间（分钟）
release_watch_post_event_minutes = 15
# 仅监控 importance >= 此值的事件触发动态调频
release_watch_importance_min = 2

[fred]
# 是否启用 FRED（美联储经济数据库）数据源
# Jin10 已覆盖美国事件日程，FRED 仅作为备用
enabled = false

# FRED API Key（申请地址：https://fred.stlouisfed.org/docs/api/api_key.html）
# 建议写入 config/economic.local.ini
api_key =

[tradingeconomics]
# 是否启用 TradingEconomics 数据源
# Jin10 已完全覆盖其功能且无配额限制，TE 降级为备用
# 如需启用，注意配额预算（免费 ~500 请求/月）并添加到 calendar_sync_sources
enabled = false

# TradingEconomics API Key
# 建议写入 config/economic.local.ini
api_key =

[fmp]
# 是否启用 FMP (Financial Modeling Prep) 数据源
# 提供全球经济日历，含 actual/forecast/previous + impact 分级
# 免费层 250 请求/天，Starter $14/月
enabled = false

# FMP API Key（申请地址：https://site.financialmodelingprep.com/developer/docs）
# 注意：免费套餐不支持经济日历端点，需 Starter 及以上套餐
# 建议写入 config/economic.local.ini
api_key =

[jin10]
# 是否启用金十数据 (Jin10) 经济日历
# 免费、无配额限制，覆盖全球经济体，含 1-5 星重要性分级
# 数据来源：https://rili.jin10.com/
# 无 token 时仅返回日历结构（时间+国家+星级），满足 Trade Guard 需求
# 配置 token 后解锁完整数值（actual/consensus/previous）
enabled = true

# Jin10 用户 Token（解锁完整数据，含 actual/forecast/previous 值）
# 获取方式：浏览器登录 rili.jin10.com → F12 → Application → Cookies → 复制 x-token 值
# 建议写入 config/economic.local.ini
token =

[alphavantage]
# 是否启用 Alpha Vantage 经济指标数据源
# Jin10 有 token 后已覆盖 actual 值，AV 仅作为备用
enabled = false

# Alpha Vantage API Key（申请地址：https://www.alphavantage.co/support/#api-key）
# 建议写入 config/economic.local.ini
api_key =

# 需要追踪的经济指标列表（逗号分隔）
# 支持: REAL_GDP, CPI, INFLATION, RETAIL_SALES, FEDERAL_FUNDS_RATE,
# NONFARM_PAYROLL, UNEMPLOYMENT, TREASURY_YIELD, CONSUMER_SENTIMENT
tracked_indicators = CPI,NONFARM_PAYROLL,FEDERAL_FUNDS_RATE,UNEMPLOYMENT,REAL_GDP,RETAIL_SALES

# ── Market Impact 行情影响统计 ────────────────────────────────────────────
# 统计重要经济数据发布前后的市场价格变化、波动率跳变。
# 数据用于策略权重调整和 Trade Guard 动态保护窗口。

[market_impact]
# 是否启用行情影响统计
enabled = true

# 统计的品种（逗号分隔）
symbols = XAUUSD

# 统计的时间框架（M1 精度最高）
timeframes = M1,M5

# 仅统计 importance >= 此阈值的事件
importance_min = 2

# 发布前回溯窗口（分钟，逗号分隔）
pre_windows = 30,60,120

# 发布后观察窗口（分钟，逗号分隔）
post_windows = 5,15,30,60,120

# 最终收集延迟（分钟）— 最大 post 窗口结束后开始最终收集
final_collection_delay_minutes = 130

# 历史回填：启动时回填过去 N 天内已 released 但未统计的事件
backfill_enabled = true
backfill_days = 7

# 聚合统计刷新间隔（秒，0=不自动刷新）
stats_refresh_interval_seconds = 21600

# Trade Guard 动态保护窗口阈值
# 高波动事件（spike > high_spike_threshold）扩大到 high_spike_buffer_minutes
high_spike_threshold = 3.0
high_spike_buffer_minutes = 60
# 中高波动事件（spike > med_spike_threshold）扩大到 med_spike_buffer_minutes
med_spike_threshold = 2.0
med_spike_buffer_minutes = 45
